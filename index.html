<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROL MAX</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
:root {
  --azul:   #111D35;
  --azul2:  #1B2A4A;
  --azul3:  #243660;
  --dorado: #C9A84C;
  --dorado2:#E2C97E;
  --dsuave: rgba(201,168,76,0.15);
  --dglow:  rgba(201,168,76,0.28);
  --blanco: #F5F7FA;
  --bp:     #FFFFFF;
  --gb:     rgba(255,255,255,0.10);
  --gs:     rgba(255,255,255,0.05);
  --dim:    rgba(245,247,250,0.52);
  --r:      10px;
  --font:   "Inter",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);background:var(--azul);color:var(--blanco);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% -5%, rgba(201,168,76,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(36,54,96,0.5) 0%, transparent 60%),
    linear-gradient(160deg, #1B2A4A 0%, #0D1628 100%);
  pointer-events:none;
}
body::after{
  content:"";position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size:52px 52px;pointer-events:none;
}
.wrap{width:100%;max-width:480px;position:relative;z-index:1;}

/* HEADER */
.header{text-align:center;margin-bottom:30px;}
.logo-wrap{position:relative;width:130px;height:130px;margin:0 auto 18px;}
.logo-img{
  width:130px;height:130px;border-radius:50%;
  object-fit:contain;background:#fff;
  border:3px solid rgba(201,168,76,0.5);
  box-shadow:0 0 0 6px rgba(201,168,76,0.1), 0 8px 32px rgba(0,0,0,0.45);
  display:block;padding:6px;
}
.brand-nombre{
  font-size:34px;font-weight:800;letter-spacing:-0.5px;
  line-height:1;margin-bottom:7px;
}
.brand-nombre .c{color:var(--bp);}
.brand-nombre .m{color:var(--dorado);}
.brand-tagline{
  font-size:11px;font-weight:500;letter-spacing:3.5px;
  text-transform:uppercase;color:var(--dim);
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:11px;
}
.brand-tagline::before,.brand-tagline::after{
  content:"";display:block;height:1px;width:28px;
  background:var(--dorado);opacity:0.5;
}
.brand-empresa{
  display:inline-block;font-size:11px;font-weight:600;letter-spacing:0.8px;
  color:var(--dorado2);background:var(--dsuave);
  border:1px solid rgba(201,168,76,0.25);border-radius:20px;padding:4px 16px;
}

/* CARD */
.card{
  background:rgba(17,29,53,0.82);border:1px solid var(--gb);
  border-radius:18px;padding:32px;
  backdrop-filter:blur(28px);
  box-shadow:0 16px 52px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05) inset;
}
.card-title{font-size:15px;font-weight:600;color:var(--bp);margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--dim);margin-bottom:24px;}

/* FIELDS */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:600;
  color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;
}
.field input{
  width:100%;background:var(--gs);border:1px solid var(--gb);
  border-radius:var(--r);padding:11px 14px;font-size:14px;
  font-family:var(--font);color:var(--bp);
  transition:border 0.2s,box-shadow 0.2s;outline:none;
}
.field input::placeholder{color:rgba(245,247,250,0.2);}
.field input:focus{border-color:var(--dorado);box-shadow:0 0 0 3px var(--dglow);}

/* BTN */
.btn-login{
  width:100%;
  background:linear-gradient(135deg,#B8922E,var(--dorado),#D4B060);
  color:var(--azul);border:none;border-radius:var(--r);
  padding:13px;font-size:14px;font-weight:800;
  font-family:var(--font);cursor:pointer;margin-top:8px;
  transition:opacity 0.2s,transform 0.1s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(201,168,76,0.35);letter-spacing:0.5px;
}
.btn-login:hover{opacity:0.9;box-shadow:0 6px 28px rgba(201,168,76,0.45);}
.btn-login:active{transform:scale(0.99);}
.btn-login:disabled{opacity:0.45;cursor:not-allowed;}

.error-msg{
  display:none;background:rgba(192,57,43,0.15);
  border:1px solid rgba(192,57,43,0.3);border-radius:var(--r);
  padding:10px 14px;font-size:13px;color:#e74c3c;margin-top:14px;text-align:center;
}
.error-msg.show{display:block;}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(17,29,53,0.3);border-top-color:var(--azul);
  border-radius:50%;animation:spin 0.7s linear infinite;
  margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* PORTAL */
.portal{display:none;}.portal.show{display:block;}
.login-wrap{display:block;}.login-wrap.hide{display:none;}
.portal-header{text-align:center;margin-bottom:22px;}
.bienvenida{font-size:12px;color:var(--dim);margin-bottom:3px;}
.usuario-nombre{font-size:22px;font-weight:700;color:var(--bp);margin-bottom:8px;}
.rol-badge{
  display:inline-block;font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;padding:4px 14px;border-radius:20px;
}
.rol-admin {background:var(--dsuave);color:var(--dorado2);border:1px solid rgba(201,168,76,0.3);}
.rol-galpon{background:rgba(30,94,168,0.2);color:#7EB6F5;border:1px solid rgba(30,94,168,0.35);}
.rol-finca {background:rgba(45,130,45,0.2);color:#8FD47A;border:1px solid rgba(45,130,45,0.35);}

.divisor{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent);
  margin:18px 0;
}
.mod-label{
  font-size:11px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--dim);margin-bottom:14px;
}

/* MÓDULOS */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.mod-card{
  background:var(--gs);border:1px solid var(--gb);
  border-radius:12px;padding:22px 14px;text-align:center;
  cursor:pointer;transition:border-color 0.2s,background 0.2s,transform 0.15s;
  text-decoration:none;display:block;position:relative;overflow:hidden;
}
.mod-card::after{
  content:"";position:absolute;inset:0;opacity:0;
  transition:opacity 0.2s;border-radius:12px;
}
.mod-card.trace::after{background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.1),transparent 70%);}
.mod-card.agro::after {background:radial-gradient(ellipse at 50% 0%,rgba(61,122,47,0.12),transparent 70%);}
.mod-card.plus::after {background:radial-gradient(ellipse at 50% 0%,rgba(74,159,214,0.12),transparent 70%);}
.mod-card:hover::after{opacity:1;}
.mod-card.trace:hover{border-color:var(--dorado);transform:translateY(-2px);}
.mod-card.agro:hover {border-color:#5FA64E;transform:translateY(-2px);}
.mod-card.plus:hover {border-color:#4A9FD6;transform:translateY(-2px);}
.mod-card.prox{opacity:0.38;cursor:default;pointer-events:none;}
.mod-ico{font-size:30px;margin-bottom:10px;display:block;line-height:1;}
.mod-nombre{
  font-size:11px;font-weight:800;letter-spacing:0.8px;
  text-transform:uppercase;margin-bottom:5px;line-height:1.3;
}
.mod-nombre .c{color:var(--bp);}
.s-trace{color:var(--dorado);}
.s-agro {color:#5FA64E;}
.s-plus {color:#4A9FD6;}
.mod-desc{font-size:10px;color:var(--dim);line-height:1.55;}
.mod-tag{
  display:inline-block;margin-top:10px;font-size:10px;
  font-weight:600;letter-spacing:0.8px;padding:3px 9px;
  border-radius:4px;text-transform:uppercase;
}
.t-dorado{background:var(--dsuave);color:var(--dorado2);}
.t-verde {background:rgba(45,130,45,0.2);color:#8FD47A;}
.t-azul  {background:rgba(30,94,168,0.2);color:#7EB6F5;}
.t-gris  {background:rgba(255,255,255,0.06);color:var(--dim);}

/* PIE */
.portal-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:16px;border-top:1px solid var(--gb);
  font-size:11px;color:var(--dim);
}
.btn-logout{
  background:none;border:1px solid var(--gb);border-radius:6px;
  color:var(--dim);font-size:11px;font-family:var(--font);
  padding:5px 12px;cursor:pointer;transition:border-color 0.15s,color 0.15s;
}
.btn-logout:hover{border-color:rgba(192,57,43,0.4);color:#e74c3c;}
.login-footer{
  text-align:center;margin-top:20px;font-size:11px;
  color:rgba(245,247,250,0.2);letter-spacing:0.5px;
}
@media(max-width:420px){
  .mod-grid{grid-template-columns:1fr;}
  .card{padding:24px 18px;}
  .brand-nombre{font-size:28px;}
}
</style>
</head>

    <div class="brand-nombre"><span class="c">CONTROL </span><span class="m">MAX</span></div>
    <div class="brand-tagline">Gestión Integral, Control Total</div>
    <div class="brand-empresa">Frutihortícola FMN S.A.</div>

  <div class="login-wrap" id="lw">
    <div class="card">
      <div class="card-title">Iniciar sesión</div>
      <div class="card-sub">Ingresá con tu usuario asignado</div>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="ie" placeholder="usuario@empresa.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="ip" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-login" id="bl" onclick="login()">Ingresar al sistema</button>
      <div class="error-msg" id="em"></div>
    </div>
    <div class="login-footer">CONTROL MAX · v1.0 · FMN Piloto 2026</div>
  </div>

  <div class="portal" id="portal">
    <div class="card">
      <div class="portal-header">
        <div class="bienvenida">Bienvenido,</div>
        <div class="usuario-nombre" id="pn">—</div>
        <div class="rol-badge" id="pb">—</div>
      </div>
      <div class="divisor"></div>
      <div class="mod-label">Módulos disponibles</div>
      <div class="mod-grid" id="mg"></div>
      <div class="portal-footer">
        <span id="pe"></span>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>

</div>
<script>
const SU="https://gfovibpzpyjebkgdwuya.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmb3ZpYnB6cHlqZWJrZ2R3dXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTY0NjcsImV4cCI6MjA5NzQ3MjQ2N30.jFrtGrJ5UB30nyNriu7sbPSOT2s_B0QHyzyQS3mP_MM";
const MODS={
  admin:[
    {id:"trace",c:"CONTROL ",s:"TRACE",sc:"s-trace",ico:"🏭",desc:"Galpón · Recepción · Trazabilidad · Remitos",tag:"Galpón",tc:"t-dorado",url:"/CONTROLTRACE/index.html"},
    {id:"agro", c:"CONTROL ",s:"AGRO", sc:"s-agro", ico:"🌿",desc:"Finca · Invernadero · Siembras · Cosecha",  tag:"Campo",  tc:"t-verde", url:"/CONTROLTRACE/controlagro/index.html"},
    {id:"plus", c:"CONTROL ",s:"PLUS", sc:"s-plus", ico:"🧾",desc:"Facturación · ARCA · Cuenta corriente",     tag:"Próximo",tc:"t-gris",  url:null,prox:true},
  ],
  galpon:[{id:"trace",c:"CONTROL ",s:"TRACE",sc:"s-trace",ico:"🏭",desc:"Galpón · Recepción · Trazabilidad · Remitos",tag:"Galpón",tc:"t-dorado",url:"/CONTROLTRACE/index.html"}],
  finca: [{id:"agro", c:"CONTROL ",s:"AGRO", sc:"s-agro", ico:"🌿",desc:"Finca · Invernadero · Siembras · Cosecha",  tag:"Campo",  tc:"t-verde", url:"/CONTROLTRACE/controlagro/index.html"}],
};
async function sp(p,b){const r=await fetch(SU+p,{method:"POST",headers:{"apikey":SK,"Content-Type":"application/json"},body:JSON.stringify(b)});return r.json();}
async function sg(t,f){const r=await fetch(SU+"/rest/v1/"+t+f,{headers:{"apikey":SK,"Authorization":"Bearer "+SK}});return r.json();}
window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("ip").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
  document.getElementById("ie").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("ip").focus();});
  const s=gs();if(s)show(s.email,s.nombre,s.rol);
});
async function login(){
  const email=document.getElementById("ie").value.trim();
  const pass=document.getElementById("ip").value;
  const btn=document.getElementById("bl");
  if(!email||!pass){se("Completá email y contraseña.");return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Verificando...';
  document.getElementById("em").classList.remove("show");
  try{
    const a=await sp("/auth/v1/token?grant_type=password",{email,password:pass});
    if(a.error||!a.access_token){se("Usuario o contraseña incorrectos.");rb();return;}
    const roles=await sg("user_roles","?user_id=eq."+a.user.id+"&activo=eq.true&limit=1");
    if(!roles||!roles.length){se("Sin permisos asignados. Contactá al administrador.");rb();return;}
    const{rol,nombre,email:em}=roles[0];
    ss({email:em||email,nombre:nombre||email,rol});
    show(em||email,nombre||email,rol);
  }catch(e){se("Error de conexión. Intentá de nuevo.");rb();}
}
function show(email,nombre,rol){
  document.getElementById("lw").classList.add("hide");
  document.getElementById("portal").classList.add("show");
  document.getElementById("pn").textContent=nombre||email;
  document.getElementById("pe").textContent=email;
  const b=document.getElementById("pb");
  b.textContent={admin:"⚙️ Administrador",galpon:"🏭 Galpón",finca:"🌿 Finca"}[rol]||rol;
  b.className="rol-badge rol-"+rol;
  const mods=MODS[rol]||MODS.galpon;
  const activos=mods.filter(m=>!m.prox);
  if(activos.length===1){window.location.href=activos[0].url;return;}
  document.getElementById("mg").innerHTML=mods.map(m=>
    '<a class="mod-card '+m.id+(m.prox?" prox":"")+'" href="'+(m.url||"#")+'"'+(m.prox?' tabindex="-1"':"")+">"+
    '<span class="mod-ico">'+m.ico+"</span>"+
    '<div class="mod-nombre"><span class="c">'+m.c+'</span><span class="'+m.sc+'">'+m.s+"</span></div>"+
    '<div class="mod-desc">'+m.desc+"</div>"+
    '<span class="mod-tag '+m.tc+'">'+m.tag+"</span>"+
    "</a>"
  ).join("");
}
function logout(){cs();document.getElementById("portal").classList.remove("show");document.getElementById("lw").classList.remove("hide");document.getElementById("ie").value="";document.getElementById("ip").value="";rb();}
function ss(d){sessionStorage.setItem("fmn",JSON.stringify(d));}
function gs(){try{return JSON.parse(sessionStorage.getItem("fmn"));}catch(e){return null;}}
function cs(){sessionStorage.removeItem("fmn");}
function se(m){const el=document.getElementById("em");el.textContent=m;el.classList.add("show");}
function rb(){const b=document.getElementById("bl");b.disabled=false;b.textContent="Ingresar al sistema";}
</script>
</body>
