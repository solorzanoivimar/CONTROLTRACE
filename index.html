<style>
:root{--navy:#16243f;--steel:#3d5a80;--sky:#7c9cbf;--gold:#c9a24b;--gold-deep:#a9842f;--cream:#f5f2ea;--ink:#1c2536;--muted:#6b7689;--line:#e7e2d6;--sage:#4f7d6a;--sage-bg:#e9f1ec;--clay:#b5654a;--clay-bg:#f6ebe6;--amber-bg:#faf3e2;font-family:'Inter',system-ui,sans-serif}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink)}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
/* LOGIN */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#16243f,#26405f);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.lcard{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:400px;width:100%;padding:32px}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.leaf{width:34px;height:34px}
h1{font-family:'Space Grotesk';font-size:18px;margin:0;font-weight:700;color:var(--navy)}
.sub{font-size:11px;color:var(--steel);letter-spacing:.16em;text-transform:uppercase}
label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;margin-top:14px;color:var(--ink)}
input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fcfbf8;font-size:14px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--steel);box-shadow:0 0 0 3px rgba(61,90,128,.12)}
.btn{border:0;border-radius:9px;padding:11px 16px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-gold{background:var(--gold);color:#3a2c08}.btn-gold:hover{background:var(--gold-deep);color:#fff}
.btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn-danger{background:#fff;color:var(--clay);border:1px solid #e7c3b6}
.btn-sm{padding:6px 10px;font-size:12px}
.msg{margin-top:14px;padding:10px 13px;border-radius:9px;font-size:13px;display:none}
.msg.ok{background:var(--sage-bg);color:var(--sage);display:block}
.msg.err{background:var(--clay-bg);color:var(--clay);display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#3a2c08;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
/* APP */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.side{width:230px;background:var(--navy);color:#cdd6e4;padding:18px 0;flex-shrink:0;display:flex;flex-direction:column}
.side .brand{padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px}
.side .brand h1{color:#fff;font-size:15px}.side .brand .sub{color:var(--sky)}
.gl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#64748b;padding:14px 20px 6px}
.side button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;color:#cdd6e4;padding:9px 20px;font-size:13.5px;cursor:pointer;text-align:left;font-family:inherit}
.side button:hover{background:rgba(255,255,255,.06);color:#fff}
.side button.on{background:rgba(201,162,75,.16);color:#fff;border-right:3px solid var(--gold)}
.side .ico{width:20px;text-align:center}
.side .foot{margin-top:auto;padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
.side .foot .who{color:#fff;font-weight:600}.side .foot .role{color:var(--sky);font-size:11px;text-transform:capitalize}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{background:#fff;border-bottom:1px solid var(--line);padding:14px 26px;display:flex;justify-content:space-between;align-items:center}
.top .crumb{font-size:11px;color:var(--steel);letter-spacing:.12em;text-transform:uppercase}
.top h2{margin:2px 0 0;font-family:'Space Grotesk';font-size:19px;color:var(--navy)}
.view{padding:24px 26px;max-width:1100px}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:20px}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-h h3{margin:0;font-family:'Space Grotesk';font-size:16px;color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{color:var(--muted);font-size:13px;margin:0 0 14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid #f0ece2}
.empty{text-align:center;color:var(--muted);padding:24px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.tag.ok{background:var(--sage-bg);color:var(--sage)}.tag.out{background:var(--clay-bg);color:var(--clay)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi{border-radius:13px;padding:16px 18px;color:#fff}
.kpi.navy{background:linear-gradient(135deg,#16243f,#2a466b)}.kpi.steel{background:linear-gradient(135deg,#3d5a80,#5878a0)}.kpi.gold{background:linear-gradient(135deg,#c9a24b,#a9842f)}
.kpi .lab{font-size:12px;opacity:.85}.kpi .val{font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:3px}.kpi .un{font-size:11px;opacity:.7}
.note{background:var(--amber-bg);border:1px solid #f0d9b0;color:#86571a;padding:14px 16px;border-radius:10px;font-size:13px}
.scan-note{font-size:13px;color:var(--steel);min-height:18px}
.banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:60;opacity:0;transition:opacity .2s}
.banner.show{opacity:1}.banner.warn{background:var(--gold-deep)}.banner.err{background:var(--clay)}
.modal-bg{position:fixed;inset:0;background:rgba(22,36,63,.45);display:none;align-items:center;justify-content:center;z-index:70;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:13px;padding:24px;max-width:480px;width:100%;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 6px;font-family:'Space Grotesk';color:var(--navy)}
.row{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.constru{text-align:center;padding:50px 20px;color:var(--muted)}
.constru .big{font-size:40px;margin-bottom:10px}
@media(max-width:760px){.layout{flex-direction:column}.side{width:100%}.grid2{grid-template-columns:1fr}}
.lblsheet{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.lbl{border:1px solid #000;background:#fff;color:#000;width:300px;padding:8px 10px;font-size:10px;line-height:1.25;position:relative}
.lbl.box{width:300px}
.lbl .lname{font-weight:700;font-size:13px;font-family:'Space Grotesk'}
.lbl .barc svg{width:100%;height:42px}
.lbl .micro{position:absolute;left:6px;top:30px;width:62px;height:62px;border-radius:50%;background:#e9e92a;border:2px solid #000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-weight:700;text-align:center}
.lbl .micro b{font-size:17px;line-height:1}
.lbl.box .bx-h{text-align:center;border:1.5px solid #000;font-weight:700;font-family:'Space Grotesk';padding:3px}
.lbl.box .bx-c{text-align:center;border:1.5px solid #000;border-top:0;font-weight:700;padding:5px;font-size:12px}
.lbl .qrwrap{display:flex;justify-content:center;margin:4px 0}
.lbl .qrwrap img,.lbl .qrwrap canvas{width:80px;height:80px}
.aizu-logo{display:inline-block;border:1.5px solid #000;border-radius:40%;padding:1px 8px;font-style:italic;font-weight:700;font-size:11px}
.tl{position:relative}
.tl .node{position:relative;padding:0 0 18px 20px;border-left:2px solid var(--line)}
.tl .node:last-child{border-left:2px solid transparent}
.tl .node:before{content:'';position:absolute;left:-8px;top:2px;width:13px;height:13px;border-radius:50%;background:var(--c,var(--steel));border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
.node.prod{--c:var(--gold-deep)}.node.desp{--c:var(--sage)}.node.ent{--c:var(--navy)}.node.disc{--c:var(--clay)}
.node .when{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.node .what{font-weight:600;color:var(--ink);font-size:14px;margin:2px 0}
.node .det{font-size:12px;color:var(--muted);line-height:1.6}
@media print{body *{visibility:hidden}#lblArea,#lblArea *,#repSheet,#repSheet *{visibility:visible}#lblArea,#repSheet{position:absolute;left:0;top:0}#repSheet{border:0}.modal{box-shadow:none;border:0}}
.remito{background:#fff;color:#000;border:1px solid #000;padding:14px;font-size:12px}
.remito .rh{display:flex;justify-content:space-between;border-bottom:1px solid #000;padding-bottom:8px}
.remito .rtitle{font-size:16px;font-weight:700;text-align:center;flex:1;font-family:'Space Grotesk'}
.remito table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px}.remito th,.remito td{border-bottom:1px solid #ccc;padding:5px 8px}
.remito .obs{border:1px solid #000;min-height:54px;margin-top:12px;padding:6px;font-size:11px}
.linkrow{display:flex;align-items:center;gap:8px}
</style>
</head>

<div id="app">

<script>
const SUPABASE_URL='https://gfovibpzpyjebkgdwuya.supabase.co';
const SUPABASE_KEY='sb_publishable_2XyV4F43cQFpFse6E7ZmuA_EuXAUUox';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const S={empresaId:null,empresa:null,rol:null,nombre:null,productos:[],clientes:[],proveedores:[],materias:[],prodMP:{},recetas:{},recepciones:[],producciones:[],despachos:[],entregas:[],preciosCliente:{},pedidos:[],operarios:[],insumos:[],prodInsumos:{},insumoMovs:[],costos:{},devoluciones:[],componentes:{},ensConsumos:[],descartes:[]};
let remCart={items:[]};
let cur='dash';

const pad=n=>String(n).padStart(5,'0');
const pad8=n=>String(n).padStart(8,'0');
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>d?d.split('-').reverse().join('/'):'—';
const nf=(n,d=0)=>(+n||0).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
const money=n=>'$'+nf(n,2);
function banner(t,k){const b=$('banner');b.textContent=t;b.className='banner show'+(k?' '+k:'');setTimeout(()=>b.className='banner',2600);}
function modal(html){$('modal').innerHTML=html;$('modalBg').classList.add('show');}
function closeModal(){$('modalBg').classList.remove('show');}
$('modalBg').onclick=e=>{if(e.target===$('modalBg'))closeModal();};

// NAV con permisos por rol (matriz aprobada)
const MODS=[
  {id:'dash',ico:'▦',name:'Panel',grupo:'Operación',roles:['admin','supervisor','comercial','preparador']},
  {id:'rec',ico:'📥',name:'Recepción',grupo:'Operación',roles:['admin','supervisor','preparador']},
  {id:'prod',ico:'⚙️',name:'Producción',grupo:'Operación',roles:['admin','supervisor','preparador']},
  {id:'ens',ico:'🌿',name:'Ensamblado',grupo:'Operación',roles:['admin','supervisor','preparador']},
  {id:'descmp',ico:'🗑️',name:'Descarte de MP',grupo:'Operación',roles:['admin','supervisor','preparador']},
  {id:'desp',ico:'🏷️',name:'Despacho',grupo:'Operación',roles:['admin','supervisor','preparador']},
  {id:'ent',ico:'🚚',name:'Entrega',grupo:'Operación',roles:['admin','supervisor','comercial']},
  {id:'dev',ico:'↩️',name:'Devoluciones',grupo:'Operación',roles:['admin','supervisor','comercial']},
  {id:'carga',ico:'✅',name:'Validación de carga',grupo:'Operación',roles:['admin','supervisor','chofer']},
  {id:'ped',ico:'📋',name:'Pedidos',grupo:'Análisis',roles:['admin','supervisor','comercial']},
  {id:'traz',ico:'🔎',name:'Trazabilidad',grupo:'Análisis',roles:['admin','supervisor','comercial','preparador']},
  {id:'stock',ico:'🏬',name:'Stock',grupo:'Análisis',roles:['admin','supervisor','comercial','preparador']},
  {id:'insu',ico:'📦',name:'Insumos',grupo:'Análisis',roles:['admin','supervisor','preparador']},
  {id:'rep',ico:'📊',name:'Reportes',grupo:'Análisis',roles:['admin','supervisor','comercial']},
  {id:'costeo',ico:'💲',name:'Costeo',grupo:'Análisis',roles:['admin','comercial']},
  {id:'cfg',ico:'⚙️',name:'Configuración',grupo:'Sistema',roles:['admin']}
];
function buildNav(){
  const allowed=MODS.filter(m=>canSee(S.rol,m.id));
  let html='',grupo='';
  allowed.forEach(m=>{if(m.grupo!==grupo){grupo=m.grupo;html+=`<div class="gl">${grupo}</div>`;}
    html+=`<button data-v="${m.id}" onclick="go('${m.id}')"><span class="ico">${m.ico}</span><span>${m.name}</span></button>`;});
  $('nav').innerHTML=html;
}
function go(v){cur=v;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render();}

const META={dash:['PANEL','Panel de control'],rec:['PASO 1 · ENTRADA','Recepción de mercadería'],prod:['PASO 2 · PROCESO','Producción'],desp:['PASO 3 · ETIQUETADO','Despacho y etiquetas'],ent:['PASO 4 · SALIDA','Entrega y remito'],ped:['DEMANDA','Pedidos y plan de compra'],rep:['DIRECCIÓN','Reporte diario'],traz:['CONSULTA','Consultar trazabilidad'],cfg:['SISTEMA','Configuración'],stock:['ANÁLISIS','Stock en cámara'],insu:['ANÁLISIS','Stock de insumos'],costeo:['ANÁLISIS','Costeo de productos'],dev:['OPERACIÓN','Devoluciones'],carga:['OPERACIÓN','Validación de carga'],ens:['OPERACIÓN','Ensamblado'],descmp:['OPERACIÓN','Descarte de materia prima']};
function render(){
  const m=MODS.find(x=>x.id===cur);
  $('crumb').textContent=(META[cur]||[m.name.toUpperCase(),m.name])[0];
  $('title').textContent=(META[cur]||['',m.name])[1];
  if(m&&m.soon){$('view').innerHTML=`<div class="card"><div class="constru"><div class="big">🚧</div><h3>${m.name} — en construcción</h3><p>Este módulo ya funciona en el piloto y lo estamos conectando a la nube en el próximo paso de la migración.</p></div></div>`;return;}
  if(cur==='dash')viewDash();
  else if(cur==='rec')viewRec();
  else if(cur==='prod')viewProd();
  else if(cur==='desp')viewDesp();
  else if(cur==='ent')viewEnt();
  else if(cur==='ped')viewPed();
  else if(cur==='rep')viewRep();
  else if(cur==='traz')viewTraz();
  else if(cur==='cfg')viewCfg();
  else if(cur==='stock')viewStock();
  else if(cur==='insu')viewInsu();
  else if(cur==='costeo')viewCosteo();
  else if(cur==='dev')viewDev();
  else if(cur==='ens')viewEns();
  else if(cur==='descmp')viewDescarte();
  else if(cur==='carga')viewCarga();
}

// ---- LOGIN ----
async function doLogin(){
  const email=$('email').value.trim(),password=$('password').value;
  if(!email||!password){lmsg('Completá correo y contraseña.',0);return;}
  $('btnLogin').innerHTML='<span class="spin"></span>Ingresando...';$('btnLogin').disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){lmsg('❌ '+error.message,0);$('btnLogin').innerHTML='Ingresar';$('btnLogin').disabled=false;return;}
  await boot();
}
function lmsg(t,ok){const m=$('lmsg');m.textContent=t;m.className='msg '+(ok?'ok':'err');}
$('btnLogin').onclick=doLogin;
$('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
$('btnLogout').onclick=async()=>{await sb.auth.signOut();location.reload();};

// ---- BOOT: cargar datos de la nube ----
async function boot(){
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user){showLogin();return;}
    const {data:perfil,error:e1}=await sb.from('perfiles').select('nombre,rol,empresa_id').eq('id',user.id).single();
    if(e1)throw new Error('Perfil: '+e1.message);
    S.empresaId=perfil.empresa_id;S.rol=perfil.rol;S.nombre=perfil.nombre;
    const {data:emp,error:e2}=await sb.from('empresas').select('*').eq('id',perfil.empresa_id).single();
    if(e2)throw new Error('Empresa: '+e2.message);
    S.empresa=emp;
    await reloadCatalogo();
    await reloadRecepciones();
    await reloadProducciones();
    await reloadDespachos();
    await reloadEntregas();
    await reloadPedidos();
    await reloadOperarios();
    await reloadInsumos();
    await reloadCostos();
    await reloadDevoluciones();
    await reloadEnsamblados();
    await reloadDescartes();
    // pintar shell
    $('empName').textContent=emp.razon_social;
    $('whoName').textContent=S.nombre;$('whoRole').textContent=S.rol;
    buildNav();
    $('login').style.display='none';$('app').style.display='block';
    go('dash');
  }catch(err){lmsg('❌ '+err.message,0);$('btnLogin').innerHTML='Ingresar';$('btnLogin').disabled=false;}
}
function showLogin(){$('app').style.display='none';$('login').style.display='flex';}
async function reloadCatalogo(){
  const [{data:prod},{data:cli},{data:prov},{data:mat},{data:comp}]=await Promise.all([
    sb.from('productos').select('*').eq('empresa_id',S.empresaId).order('nombre'),
    sb.from('clientes').select('*').eq('empresa_id',S.empresaId).order('razon_social'),
    sb.from('proveedores').select('*').eq('empresa_id',S.empresaId).order('nombre'),
    sb.from('producto_materias').select('producto_id,materia_prima,cantidad,por_kilo').eq('empresa_id',S.empresaId),
    sb.from('producto_componentes').select('producto_id,componente,cantidad').eq('empresa_id',S.empresaId)
  ]);
  S.productos=prod||[];S.clientes=cli||[];S.proveedores=prov||[];
  const byId={};(S.productos||[]).forEach(p=>byId[p.id]=p.nombre);
  S.prodMP={};S.recetas={};
  (mat||[]).forEach(m=>{const n=byId[m.producto_id];if(!n)return;(S.prodMP[n]=S.prodMP[n]||[]).push(m.materia_prima);(S.recetas[n]=S.recetas[n]||[]).push({mp:m.materia_prima,cantidad:+m.cantidad||0});});
  S.materias=[...new Set((mat||[]).map(m=>m.materia_prima))].sort();
  S.componentes={};(comp||[]).forEach(c=>{const n=byId[c.producto_id];if(!n)return;(S.componentes[n]=S.componentes[n]||[]).push({componente:c.componente,cantidad:+c.cantidad||0});});
}
function prodTipo(nombre){const p=S.productos.find(x=>x.nombre===nombre);return p&&p.tipo?p.tipo:'simple';}
async function reloadProducciones(){
  const [{data:prods},{data:outs},{data:plotes}]=await Promise.all([
    sb.from('producciones').select('*').eq('empresa_id',S.empresaId).order('created_at',{ascending:false}),
    sb.from('produccion_outputs').select('*').eq('empresa_id',S.empresaId),
    sb.from('produccion_lotes').select('*').eq('empresa_id',S.empresaId)
  ]);
  const recByUuid={};S.recepciones.forEach(r=>recByUuid[r.id]=r.codigo_lote);
  S.producciones=(prods||[]).map(p=>({
    id:p.codigo_op,uuid:p.id,loteId:recByUuid[p.recepcion_id]||'',recepcionUuid:p.recepcion_id,
    fecha:p.fecha,mpKg:+p.mp_kg||0,operarios:p.operarios||0,horaIni:p.hora_inicio||'',horaFin:p.hora_fin||'',horas:+p.horas||0,
    estado:p.estado,
    outputs:(outs||[]).filter(o=>o.produccion_id===p.id).map(o=>({code:o.codigo_prod,producto:o.producto_nombre,cantidad:+o.cantidad||0,kilos:+o.kilos||0})),
    lotes:(plotes||[]).filter(l=>l.produccion_id===p.id).map(l=>({loteId:l.codigo_lote||recByUuid[l.recepcion_id]||'',recepcionUuid:l.recepcion_id,mp:l.materia_prima,kg:+l.kg||0}))
  }));
}
async function reloadRecepciones(){

let periodos={rec:'mes',prod:'mes',desp:'mes',ent:'mes'};
let periodosR={rec:{d:'',h:''},prod:{d:'',h:''},desp:{d:'',h:''},ent:{d:'',h:''}};
function enPeriodo(fecha,key){const p=periodos[key]||'mes';if(p==='todo')return true;if(!fecha)return false;const now=new Date();const f=new Date(fecha+'T00:00:00');
  if(p==='rango'){const r=periodosR[key]||{};if(r.d&&fecha<r.d)return false;if(r.h&&fecha>r.h)return false;return true;}
  if(p==='mes')return f.getFullYear()===now.getFullYear()&&f.getMonth()===now.getMonth();
  if(p==='prev'){const d=new Date(now.getFullYear(),now.getMonth()-1,1);return f.getFullYear()===d.getFullYear()&&f.getMonth()===d.getMonth();}
  if(p==='3m'){const d=new Date(now.getFullYear(),now.getMonth()-2,1);return f>=d;}
  if(p==='año')return f.getFullYear()===now.getFullYear();
  return true;}
function periodSelect(key){const p=periodos[key]||'mes';const r=periodosR[key]||{d:'',h:''};const opts=[['mes','Mes actual'],['prev','Mes anterior'],['3m','Últimos 3 meses'],['año','Año actual'],['todo','Todo el histórico'],['rango','Fecha específica']];let html=`<span style="display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)">📅 Período <select onchange="setPeriodo('${key}',this.value)" style="width:auto;font-size:12px;padding:5px 8px;border:1px solid var(--steel);border-radius:8px;color:var(--navy);font-weight:600">${opts.map(o=>`<option value="${o[0]}" ${p===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;if(p==='rango'){html+=` <input type="date" value="${r.d}" title="Desde" onchange="setPeriodoR('${key}','d',this.value)" style="width:auto;font-size:12px;padding:4px 6px"> <span>a</span> <input type="date" value="${r.h}" title="Hasta" onchange="setPeriodoR('${key}','h',this.value)" style="width:auto;font-size:12px;padding:4px 6px">`;}html+=`</span>`;return html;}
function setPeriodoR(key,which,val){periodosR[key]=periodosR[key]||{d:'',h:''};periodosR[key][which]=val;render();}
function setPeriodo(key,val){periodos[key]=val;render();}

async function saveRecep(){
  const fecha=$('r_fecha').value,prov=$('r_prov').value.trim(),mp=$('r_mp').value.trim().toUpperCase(),recib=$('r_recib').value.trim();
  const cajas=+$('r_cajas').value||0,kilos=+$('r_kilos').value||0,precio=+$('r_precio').value||0;
  if(!mp||!kilos){banner('Indicá al menos materia prima y kilos','warn');return;}
  if(!recib){banner('Indicá quién recibe la mercadería','warn');return;}
  $('r_save').innerHTML='<span class="spin"></span>Guardando...';$('r_save').disabled=true;
  try{
    const {data:num,error:e1}=await sb.rpc('siguiente_numero',{p_tipo:'lote'});
    if(e1)throw e1;
    const codigo='L-'+pad(num);
    const {error:e2}=await sb.from('recepciones').insert({empresa_id:S.empresaId,codigo_lote:codigo,fecha,proveedor:prov,materia_prima:mp,cajas,kilos,precio_kilo:precio,total:kilos*precio,recibido_por:recib,estado:'activa'});
    if(e2)throw e2;
    if(prov&&!S.proveedores.some(p=>(p.nombre||'').toUpperCase()===prov.toUpperCase())){
      await sb.from('proveedores').insert({empresa_id:S.empresaId,nombre:prov});
    }
    await reloadCatalogo();await reloadRecepciones();
    banner('Recepción '+codigo+' registrada','');
    go('rec');
    setTimeout(()=>labelLoteRec(codigo),80);
  }catch(err){banner('Error: '+err.message,'err');$('r_save').innerHTML='✓ Registrar recepción';$('r_save').disabled=false;}
}

// ---- PRODUCCIÓN (conectada a la nube) ----
function recActiva(codigo){return S.recepciones.find(r=>r.codigo_lote===codigo&&r.estado!=='anulada');}
function kgConsumidoLote(codigo){let s=0;S.producciones.filter(p=>p.estado!=='anulada').forEach(p=>{if(p.loteId===codigo)s+=+p.mpKg||0;(p.lotes||[]).forEach(l=>{if(l.loteId===codigo)s+=+l.kg||0;});});return s;}
function descartadoLote(codigo){return (S.descartes||[]).filter(d=>d.codigo_lote===codigo).reduce((s,d)=>s+(+d.kg||0),0);}
function stockLote(r){return Math.max(0,(+r.kilos||0)-kgConsumidoLote(r.codigo_lote)-descartadoLote(r.codigo_lote));}
function lotesConStock(){return S.recepciones.filter(r=>r.estado!=='anulada'&&stockLote(r)>0.001).sort((a,b)=>a.fecha<b.fecha?-1:1);}
function lotesDeMP(mp){return S.recepciones.filter(r=>r.estado!=='anulada'&&(r.materia_prima||'').toUpperCase()===(mp||'').toUpperCase()&&stockLote(r)>0.001).sort((a,b)=>a.fecha<b.fecha?-1:1);}
function lotesAnteriores(r){return S.recepciones.filter(x=>x.estado!=='anulada'&&x.codigo_lote!==r.codigo_lote&&(x.materia_prima||'').toUpperCase()===(r.materia_prima||'').toUpperCase()&&x.fecha<r.fecha&&stockLote(x)>0.001).sort((a,b)=>a.fecha<b.fecha?-1:1);}
function eligibleProds(mp){return S.productos.filter(p=>(p.tipo||'simple')==='simple'&&(S.prodMP[p.nombre]||[]).some(x=>(x||'').toUpperCase()===(mp||'').toUpperCase()));}
function horasEntre(ini,fin){if(!ini||!fin)return 0;const[h1,m1]=ini.split(':').map(Number),[h2,m2]=fin.split(':').map(Number);let d=(h2*60+m2)-(h1*60+m1);if(d<0)d+=1440;return d/60;}

function alocarPEPS(mp,kgNec){const lots=lotesDeMP(mp);const out=[];let rem=kgNec;for(const l of lots){const av=stockLote(l);if(av<=0)continue;const take=Math.min(av,rem);if(take<=0)break;out.push({recepcionUuid:l.id,codigo_lote:l.codigo_lote,fecha:l.fecha,mp,kg:+take.toFixed(3)});rem-=take;if(rem<=0.001)break;}return {asign:out,falta:Math.max(0,rem)};}
function onCompChange(){
  const nombre=$('cp_prod').value;const panel=$('cp_panel');if(!nombre){panel.innerHTML='';return;}
  const receta=S.recetas[nombre]||[];window._compReceta=receta;
  let comp='';receta.forEach(r=>{const lots=lotesDeMP(r.mp);const tot=lots.reduce((a,l)=>a+stockLote(l),0);
    comp+=`<div style="margin:6px 0;font-size:13px"><b>${r.mp}</b> <span style="color:var(--muted)">— receta ${nf(r.cantidad,3)} kg/paq · stock ${nf(tot,1)}kg en ${lots.length} lote(s)</span></div>`;});
  panel.innerHTML=`${comp}<div class="note" style="margin:8px 0;padding:9px 12px">El sistema toma de los lotes en orden <b>PEPS</b> (primero el más antiguo) y reparte entre varios si hace falta.</div>

   <div id="cp_calc" class="scan-note" style="margin:8px 0"></div>
   <div class="g2"><div><label>Operarios</label><input type="number" id="cp_oper" min="1"></div><div><label>Hora inicio</label><input type="time" id="cp_ini"></div></div>

   <button class="btn btn-gold" id="cp_save" style="width:100%;margin-top:14px" onclick="saveCompuesto('${esc(nombre)}')">Producir compuesto</button>`;
}
function compCalc(){const paq=+$('cp_paq').value||0;const receta=window._compReceta||[];let html='';receta.forEach(r=>{const kg=paq*r.cantidad;const {asign,falta}=alocarPEPS(r.mp,kg);html+=`<div style="margin-bottom:3px"><b>${r.mp}: ${nf(kg,3)}kg</b> ${falta>0.001?`<span style="color:var(--clay)">⚠ faltan ${nf(falta,2)}kg en cámara</span>`:'→ '+asign.map(a=>`${nf(a.kg,2)}kg de ${a.codigo_lote} (${fmtD(a.fecha)})`).join(' + ')}</div>`;});$('cp_calc').innerHTML=paq?html:'';}
async function saveCompuesto(nombre){
  const paq=+$('cp_paq').value||0;if(!paq)return banner('Indicá la cantidad de paquetes','warn');
  const receta=window._compReceta||S.recetas[nombre]||[];if(!receta.length)return banner('El producto no tiene receta cargada','warn');
  const comps=[];
  for(const r of receta){const kg=paq*r.cantidad;const {asign,falta}=alocarPEPS(r.mp,kg);if(falta>0.001)return banner('No alcanza el stock de '+r.mp+' (faltan '+nf(falta,2)+'kg)','warn');asign.forEach(a=>comps.push(a));}
  $('cp_save').innerHTML='<span class="spin"></span>Guardando...';$('cp_save').disabled=true;
  try{
    const {data:opNum,error:e1}=await sb.rpc('siguiente_numero',{p_tipo:'op'});if(e1)throw e1;
    const codigoOp='P-'+pad(opNum);const totalKg=comps.reduce((a,c)=>a+c.kg,0);
    const ini=$('cp_ini').value,fin=$('cp_fin').value;
    const {data:prodRow,error:e2}=await sb.from('producciones').insert({empresa_id:S.empresaId,codigo_op:codigoOp,recepcion_id:null,fecha:today(),mp_kg:totalKg,operarios:+$('cp_oper').value||0,hora_inicio:ini||null,hora_fin:fin||null,horas:horasEntre(ini,fin),estado:'abierta'}).select('id').single();
    if(e2)throw e2;
    const {data:pn}=await sb.rpc('siguiente_numero',{p_tipo:'prod'});
    const {error:e3}=await sb.from('produccion_outputs').insert({empresa_id:S.empresaId,produccion_id:prodRow.id,codigo_prod:'PR-'+pad(pn),producto_nombre:nombre,cantidad:paq,kilos:+(paq*(prodKg(nombre)||0)).toFixed(3)});
    if(e3)throw e3;
    const {error:e4}=await sb.from('produccion_lotes').insert(comps.map(c=>({empresa_id:S.empresaId,produccion_id:prodRow.id,recepcion_id:c.recepcionUuid,codigo_lote:c.codigo_lote,materia_prima:c.mp,kg:c.kg})));
    if(e4)throw e4;
    await reloadProducciones();banner('Compuesto '+codigoOp+' producido','');go('prod');
  }catch(err){banner('Error: '+err.message,'err');$('cp_save').innerHTML='Producir compuesto';$('cp_save').disabled=false;}
}
async function anularProd(codigo){const p=S.producciones.find(x=>x.id===codigo);if(!confirm('¿Anular '+codigo+'? Se libera el stock que había consumido.'))return;await sb.from('producciones').update({estado:'anulada'}).eq('empresa_id',S.empresaId).eq('id',p.uuid);await restaurarInsumos(codigo);await reloadProducciones();await reloadInsumos();closeModal();banner(codigo+' anulada','warn');render();}
function prodRows(){return S.producciones.filter(p=>enPeriodo(p.fecha,'prod')).slice(0,300).map(p=>{const paq=p.outputs.reduce((a,o)=>a+(+o.cantidad||0),0);const est=p.estado==='anulada'?['out','Anulada']:p.estado==='validada'?['ok','Validada 🔒']:['',`<span style="background:var(--amber-bg);color:#86571a;padding:2px 9px;border-radius:20px">Abierta</span>`];return`<tr style="${p.estado==='anulada'?'opacity:.5':''}"><td class="mono">${p.id}</td><td>${fmtD(p.fecha)}</td><td class="mono">${p.loteId}</td><td class="mono">${nf(p.mpKg,1)}</td><td class="mono">${nf(paq)}</td><td>${p.estado==='abierta'?est[1]:`<span class="tag ${est[0]}">${est[1]}</span>`}</td><td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="detalleOP('${p.id}')">🔍</button> <button class="btn btn-ghost btn-sm" onclick="editProd('${p.id}')">✎</button>${p.estado==='abierta'?` <button class="btn btn-gold btn-sm" onclick="validarProd('${p.id}')">✓</button>`:''}</td></tr>`;}).join('')||'<tr><td colspan=7 class=empty>Sin producciones en el período</td></tr>';}
function recMP(codigo){const r=S.recepciones.find(x=>x.codigo_lote===codigo);return r?r.materia_prima:'MP';}
function detalleOP(codigo){
  const p=S.producciones.find(x=>x.id===codigo);if(!p)return;
  const paq=p.outputs.reduce((a,o)=>a+(+o.cantidad||0),0);
  const consumo=(p.lotes&&p.lotes.length)?p.lotes.map(l=>`· ${l.mp}: <b>${nf(l.kg,3)}kg</b> del lote ${l.loteId}`).join('<br>'):`· ${recMP(p.loteId)}: <b>${nf(p.mpKg,1)}kg</b> del lote ${p.loteId||'—'}`;
  const kgOut=p.outputs.reduce((a,o)=>a+(+o.kilos||0),0);
  const merma=Math.max(0,p.mpKg-kgOut);
  const rend=p.mpKg>0?kgOut/p.mpKg*100:0;
  const hh=(p.operarios>0&&p.horas>0)?`${p.operarios} operarios · ${nf(p.horas,2)}h = ${nf(p.operarios*p.horas,1)} horas-hombre · ${nf(paq/(p.operarios*p.horas),1)} paq/h-h`:'sin datos de horas';
  const est=p.estado==='validada'?['ok','Validada 🔒']:p.estado==='anulada'?['out','Anulada']:['','Abierta'];
  modal(`<h3>Detalle de ${codigo}</h3>
   <div style="display:flex;gap:12px;align-items:center;font-size:13px;margin-bottom:10px"><span class="tag ${est[0]}">${est[1]}</span><span style="color:var(--muted)">${fmtD(p.fecha)}</span></div>
   <div style="font-size:13px;line-height:1.8">
     <b>Materia prima consumida</b><br>${consumo}<br><br>
     <b>Productos resultantes</b><br>${p.outputs.map(o=>`· ${o.producto}: <b>${nf(o.cantidad)} paquetes</b> (${nf(o.kilos,1)}kg) · cód. ${o.code}`).join('<br>')||'— (sin completar)'}<br><br>
     <b>Producto obtenido:</b> ${nf(kgOut,1)}kg de ${nf(p.mpKg,1)}kg de MP<br>
     <b>Merma:</b> ${nf(merma,1)}kg (${nf(p.mpKg>0?merma/p.mpKg*100:0,0)}% de la materia prima)<br>
     <b>Rendimiento:</b> ${nf(rend,0)}% (kilos de producto sobre kilos de MP)<br>
     <b>Mano de obra:</b> ${hh}
   </div>
   <div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
}

/* Normaliza códigos escaneados: tolera lectores con distribución de teclado
   distinta (que escriben L'00017 o L/00017 en vez de L-00017). */
function normCode(s){return (s||'').toString().toUpperCase().replace(/[^A-Z0-9]/g,'');}
function fixCode(s){return (s||'').toString().trim().toUpperCase().replace(/[^A-Z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function prodScan(){
  const i=$('pp_scan'),msg=$('pp_scanmsg'),sel=$('pp_lote');if(!i||!sel)return;
  let v=(i.value||'').trim();if(!v){if(msg)msg.innerHTML='Escaneá o tipeá un código de lote.';return;}
  try{const o=JSON.parse(v);v=o.lote||o.op||v;}catch(e){}
  v=fixCode(v);const nv=normCode(v);
  const opt=[...sel.options].find(o=>o.value&&normCode(o.value)===nv);
  if(opt){sel.value=opt.value;i.value='';if(msg)msg.innerHTML=`✓ Lote <b>${opt.value}</b> cargado.`;onLoteChange();return;}
  const r=S.recepciones.find(x=>normCode(x.codigo_lote)===nv);
  if(msg){
    if(r&&r.estado==='anulada')msg.innerHTML=`⚠️ El lote <b>${v}</b> está anulado: no se puede procesar.`;
    else if(r)msg.innerHTML=`⚠️ El lote <b>${v}</b> ya no tiene stock disponible en cámara.`;
    else msg.innerHTML=`⚠️ No encontré el lote <b>${v}</b>. Verificá que sea una etiqueta de lote (L-…).`;
  }
  i.select();
}
function onLoteChange(){

  window._eligOpts=(eligibleProds(r.materia_prima).length?eligibleProds(r.materia_prima):S.productos).map(p=>`<option>${p.nombre}</option>`).join('');

function prodKg(name){const p=S.productos.find(x=>x.nombre===name);return p?+p.contenido_kg||0:0;}
function outCalc(el){const row=el.closest('[data-outrow]');const cant=+row.querySelector('.o_cant').value||0;const k=row.querySelector('.o_kilos');if(k.dataset.touch)return;const kg=prodKg(row.querySelector('.o_prod').value);k.value=(cant&&kg)?+(cant*kg).toFixed(3):'';}
function addOutRow(){const w=$('pp_outs');const d=document.createElement('div');d.className='g2';d.setAttribute('data-outrow','');d.style.gridTemplateColumns='1.6fr .7fr .7fr auto';d.style.marginBottom='6px';d.innerHTML=`<select class="o_prod" onchange="outCalc(this)">${window._eligOpts||''}</select><input class="o_cant" type="number" placeholder="paq." min="0" oninput="outCalc(this)"><input class="o_kilos" type="number" placeholder="kg" min="0" step="0.01" oninput="this.dataset.touch=1"><button class="btn btn-ghost btn-sm" onclick="this.parentNode.remove()">✕</button>`;w.appendChild(d);}

async function saveProd(codigo){
  const r=recActiva(codigo);const mp=+$('pp_mp').value||0;
  if(!mp)return banner('Indicá los kilos de MP','warn');
  if(mp>stockLote(r)+0.01)return banner('No hay tanto stock en el lote','warn');
  const ant=lotesAnteriores(r);
  if(ant.length&&!(window._fefoOk&&window._fefoOk[codigo])){
    modal(`<h3>⚠️ Autorización PEPS</h3><p class="hint">Vas a procesar ${codigo} habiendo lotes anteriores de ${r.materia_prima}. Ingresá el PIN del supervisor para autorizar.</p><label>PIN de supervisor</label><input type="password" id="fefo_pin" placeholder="••••"><div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="fefoAuth('${codigo}')">Autorizar</button></div>`);return;

    const codigoOp='P-'+pad(opNum);
    const ini=$('pp_ini').value,fin=$('pp_fin').value;
    const {data:prodRow,error:e2}=await sb.from('producciones').insert({empresa_id:S.empresaId,codigo_op:codigoOp,recepcion_id:r.id,fecha:today(),mp_kg:mp,operarios:+$('pp_oper').value||0,hora_inicio:ini||null,hora_fin:fin||null,horas:horasEntre(ini,fin),estado:'abierta'}).select('id').single();
    if(e2)throw e2;
    for(const o of outs){const {data:pn}=await sb.rpc('siguiente_numero',{p_tipo:'prod'});o.code='PR-'+pad(pn);}
    const {error:e3}=await sb.from('produccion_outputs').insert(outs.map(o=>({empresa_id:S.empresaId,produccion_id:prodRow.id,codigo_prod:o.code,producto_nombre:o.producto,cantidad:o.cantidad,kilos:o.kilos})));
    if(e3)throw e3;
    if(window._fefoOk)delete window._fefoOk[codigo];
    await reloadProducciones();banner('Producción '+codigoOp+' abierta','');go('prod');
  }catch(err){banner('Error: '+err.message,'err');$('pp_save').innerHTML='Abrir producción';$('pp_save').disabled=false;}
}
function fefoAuth(codigo){if($('fefo_pin').value!==(S.empresa.pin||'1234'))return banner('PIN incorrecto','err');window._fefoOk=window._fefoOk||{};window._fefoOk[codigo]=true;closeModal();saveProd(codigo);}

function epCalc(el){const row=el.closest('[data-eprow]');const cant=+row.querySelector('.ep_c').value||0;const k=row.querySelector('.ep_k');if(k.dataset.touch)return;const kg=prodKg(row.querySelector('.ep_prod').value);k.value=(cant&&kg)?+(cant*kg).toFixed(3):'';}
function epRow(o,optsBase){const sel=o?o.producto:'';const opts=optsBase.map(p=>`<option ${p.nombre===sel?'selected':''}>${p.nombre}</option>`).join('');return `<div class="g2" data-eprow style="grid-template-columns:1.6fr .7fr .7fr auto;margin-bottom:6px"><select class="ep_prod" onchange="epCalc(this)">${opts}</select><input class="ep_c" type="number" placeholder="paq." value="${o?o.cantidad:''}" oninput="epCalc(this)"><input class="ep_k" type="number" step="0.01" placeholder="kg" value="${o?o.kilos:''}" oninput="this.dataset.touch=1"><button class="btn btn-ghost btn-sm" onclick="this.parentNode.remove()">✕</button></div>`;}
function epAddRow(){const w=$('ep_outs');const d=document.createElement('div');d.innerHTML=`<div class="g2" data-eprow style="grid-template-columns:1.6fr .7fr .7fr auto;margin-bottom:6px"><select class="ep_prod" onchange="epCalc(this)">${window._epOpts||''}</select><input class="ep_c" type="number" placeholder="paq." oninput="epCalc(this)"><input class="ep_k" type="number" step="0.01" placeholder="kg" oninput="this.dataset.touch=1"><button class="btn btn-ghost btn-sm" onclick="this.parentNode.remove()">✕</button></div>`;w.appendChild(d.firstChild);}
async function saveEditProd(codigo){
  const p=S.producciones.find(x=>x.id===codigo);
  const outs=[];document.querySelectorAll('#ep_outs [data-eprow]').forEach(row=>{const prod=row.querySelector('.ep_prod').value,c=+row.querySelector('.ep_c').value||0,k=+row.querySelector('.ep_k').value||0;if(prod&&c>0)outs.push({producto:prod,cantidad:c,kilos:k});});
  if(!outs.length)return banner('Agregá al menos un producto','warn');
  try{
    const ini=$('ep_ini').value,fin=$('ep_fin').value;
    const {error:e1}=await sb.from('producciones').update({mp_kg:+$('ep_mp').value||0,operarios:+$('ep_op').value||0,hora_inicio:ini||null,hora_fin:fin||null,horas:horasEntre(ini,fin)}).eq('empresa_id',S.empresaId).eq('id',p.uuid);
    if(e1)throw e1;
    await sb.from('produccion_outputs').delete().eq('produccion_id',p.uuid);
    for(const o of outs){const {data:pn}=await sb.rpc('siguiente_numero',{p_tipo:'prod'});o.code='PR-'+pad(pn);}
    const {error:e3}=await sb.from('produccion_outputs').insert(outs.map(o=>({empresa_id:S.empresaId,produccion_id:p.uuid,codigo_prod:o.code,producto_nombre:o.producto,cantidad:o.cantidad,kilos:o.kilos})));
    if(e3)throw e3;
    await reloadProducciones();closeModal();banner(codigo+' actualizada','');render();
  }catch(err){banner('Error: '+err.message,'err');}
}
function validarProd(codigo){
  const p=S.producciones.find(x=>x.id===codigo);
  if(!p.outputs.some(o=>o.cantidad>0))return banner('Completá los paquetes antes de validar','warn');
  modal(`<h3>Validar ${codigo}</h3><p class="hint">Una vez validada queda <b>bloqueada</b>: no se podrá editar salvo que el supervisor la desbloquee con PIN. Evita cambios posteriores no autorizados.</p><div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="doValidarProd('${codigo}')">✓ Validar y bloquear</button></div>`);
}
async function doValidarProd(codigo){
  const p=S.producciones.find(x=>x.id===codigo);
  const {error}=await sb.from('producciones').update({estado:'validada',validado_at:new Date().toISOString()}).eq('empresa_id',S.empresaId).eq('id',p.uuid);
  if(error){banner('Error: '+error.message,'err');return;}
  await consumirInsumos(codigo,p.outputs);
  await reloadProducciones();await reloadInsumos();closeModal();banner(codigo+' validada 🔒','');render();
}
async function unlockProd(codigo){
  if($('up_pin').value!==(S.empresa.pin||'1234'))return banner('PIN incorrecto','err');
  const p=S.producciones.find(x=>x.id===codigo);
  await sb.from('producciones').update({estado:'abierta'}).eq('empresa_id',S.empresaId).eq('id',p.uuid);
  await restaurarInsumos(codigo);
  await reloadProducciones();await reloadInsumos();closeModal();banner('OP desbloqueada','warn');editProd(codigo);
}

// ---- DESPACHO Y ETIQUETAS (etiquetar producción, lote real) ----
function prodInfo(nombre){const p=S.productos.find(x=>x.nombre===nombre)||{};return {kg:+p.contenido_kg||0,gtin:p.gtin||'',rnpa:p.rnpa||'',rne:p.rne||'',fam:p.familia||'aizu',micro:!!p.microondas,uxc:+p.unidades_por_caja||1,vida:+p.vida_util_dias||0};}
function addDays(d,n){const x=new Date(d+'T00:00:00');x.setDate(x.getDate()+(+n||0));return x.toISOString().slice(0,10);}
function despachadoDe(code){let s=0;S.despachos.filter(d=>d.estado!=='anulada').forEach(d=>d.items.forEach(it=>(it.consumido||[]).forEach(c=>{if(c.code===code)s+=+c.cantidad||0;})));return s;}
function reingresoPT(code){return (S.devoluciones||[]).filter(d=>d.tipo==='reingreso_pt'&&d.output_code===code).reduce((s,d)=>s+(+d.cantidad||0),0);}
function ensambladoConsumidoDe(code){return (S.ensConsumos||[]).filter(c=>c.output_code===code).reduce((s,c)=>s+(+c.cantidad||0),0);}
function stockOut(o){return Math.max(0,(+o.cantidad||0)-despachadoDe(o.code)+reingresoPT(o.code)-ensambladoConsumidoDe(o.code));}
function prodByCode(code){for(const p of S.producciones){for(const o of p.outputs){if(o.code===code)return p;}}return null;}
function loteInfoDeProd(p){if(p.lotes&&p.lotes.length){return {lote:p.id,op:p.id,origen:p.lotes.map(l=>`${l.mp} ${l.loteId}`)};}return {lote:p.loteId||p.id,op:p.id,origen:[p.loteId||p.id]};}
function loteDeItem(it){const c=(it.consumido||[])[0];if(!c)return {lote:'—',op:'',origen:[]};const p=prodByCode(c.code);return p?loteInfoDeProd(p):{lote:'—',op:'',origen:[]};}
function labelables(){const out=[];S.producciones.filter(p=>p.estado!=='anulada').forEach(p=>p.outputs.forEach(o=>{const disp=stockOut(o);if(disp>0){const li=loteInfoDeProd(p);out.push({op:p.id,opFecha:p.fecha,producto:o.producto,code:o.code,disp,lote:li.lote,origen:li.origen});}}));return out;}
async function reloadDespachos(){

    sb.from('despachos').select('*').eq('empresa_id',S.empresaId).order('created_at',{ascending:false}),
    sb.from('despacho_items').select('*').eq('empresa_id',S.empresaId)
  ]);
  S.despachos=(desps||[]).map(d=>({id:d.codigo,uuid:d.id,fecha:d.fecha,cliFmt:d.cliente_formato,estado:d.estado,
    items:(items||[]).filter(it=>it.despacho_id===d.id).map(it=>({producto:it.producto_nombre,cantidad:+it.cantidad||0,uxc:it.unidades_por_caja||1,cajas:it.cajas||0,vto:it.vto,fmt:it.formato,consumido:it.consumido||[]}))}));
}

function despInsumosReceta(prod){return (S.prodInsumos[prod]||[]).filter(r=>r.momento==='despacho');}
function renderDespInsumos(l){const w=$('d_insumos');if(!w)return;const receta=despInsumosReceta(l.producto);if(!receta.length){w.innerHTML='';return;}
  w.innerHTML=`<label style="margin-top:8px">Insumos de despacho (sugerido automático, editable)</label>${receta.map(r=>`<div class="g2" style="grid-template-columns:1.5fr .6fr;align-items:center;margin-bottom:6px"><span style="font-size:13px">${r.nombre} <span style="color:var(--muted);font-size:11px">(${r.base==='caja'?'por caja':'por unidad'})</span></span><input type="number" min="0" step="0.01" data-ins="${r.insumo_id}" data-rec="${r.cantidad}" data-base="${r.base}" oninput="this.dataset.touch=1"></div>`).join('')}<div class="scan-note" style="margin-bottom:6px">Ajustá la cantidad real que sale (ej: pallets).</div>`;}
function dCalc(){const cant=+$('d_cant').value||0,uxc=+$('d_uxc').value||1,vida=+$('d_vida').value||0,fecha=$('d_fecha').value;const cajas=cant?Math.ceil(cant/uxc):0;$('d_vto').value=(vida&&fecha)?fmtD(addDays(fecha,vida)):'';$('d_calc').innerHTML=cant?`${cajas} caja(s) de ${uxc} unidades`:'';
  document.querySelectorAll('#d_insumos input[data-ins]').forEach(inp=>{if(inp.dataset.touch)return;const base=inp.dataset.base==='caja'?cajas:cant;inp.value=+(base*(+inp.dataset.rec||0)).toFixed(2);});}
function despRows(){return S.despachos.filter(d=>enPeriodo(d.fecha,'desp')).slice(0,300).map(d=>{const it=d.items[0]||{};const li=it.consumido?loteDeItem(it):{lote:'—'};return `<tr style="${d.estado==='anulada'?'opacity:.5':''}"><td class="mono">${d.id}</td><td>${fmtD(d.fecha)}</td><td>${(it.producto||'').slice(0,18)}</td><td class="mono">${li.lote}</td><td class="mono">${nf(it.cantidad||0)}</td><td><button class="btn btn-ghost btn-sm" onclick="reLabels('${d.id}')">🏷️</button></td></tr>`;}).join('')||'<tr><td colspan=6 class=empty>Sin etiquetas en el período</td></tr>';}
async function genDesp(i){
  const l=window._labs[i];if(!l)return;const cant=+$('d_cant').value||0,fecha=$('d_fecha').value,cliFmt=$('d_cli').value,info=prodInfo(l.producto);
  const uxc=+$('d_uxc').value||info.uxc||1,vida=+$('d_vida').value||0;
  if(!cant)return banner('Indicá la cantidad','warn');
  if(cant>l.disp+0.001)return banner('Solo hay '+nf(l.disp)+' unidades disponibles en ese lote','warn');
  const vto=vida?addDays(fecha,vida):null;const cajas=Math.ceil(cant/uxc);
  const fmt=(cliFmt==='aizu'||info.fam==='aizu')?'aizu':(info.micro?'micro':'anonima');

  const insumosDesp=[...document.querySelectorAll('#d_insumos input[data-ins]')].map(inp=>({insumo_id:inp.dataset.ins,qty:+inp.value||0})).filter(x=>x.qty>0);
  $('d_gen').innerHTML='<span class="spin"></span>Generando...';$('d_gen').disabled=true;
  try{
    const {data:num,error:e1}=await sb.rpc('siguiente_numero',{p_tipo:'despacho'});if(e1)throw e1;
    const codigo='D-'+pad(num);
    const {data:dRow,error:e2}=await sb.from('despachos').insert({empresa_id:S.empresaId,codigo,fecha,cliente_formato:cliFmt,estado:'activa'}).select('id').single();
    if(e2)throw e2;
    const {error:e3}=await sb.from('despacho_items').insert({empresa_id:S.empresaId,despacho_id:dRow.id,producto_nombre:l.producto,cantidad:cant,unidades_por_caja:uxc,cajas,vto,formato:fmt,consumido});
    if(e3)throw e3;
    await consumirInsumosDespachoManual(codigo,insumosDesp);
    await reloadInsumos();
    await reloadCostos();
    await reloadDevoluciones();
    await reloadEnsamblados();
    await reloadDescartes();await reloadDespachos();
    const d={id:codigo,fecha,cliFmt,items:[{producto:l.producto,cantidad:cant,uxc,cajas,vto,fmt,consumido}]};
    banner('Etiquetas '+codigo+' generadas · lote '+l.lote,'');
    render();renderLabels(d);
  }catch(err){banner('Error: '+err.message,'err');$('d_gen').innerHTML='🏷️ Generar etiquetas (paquete + caja)';$('d_gen').disabled=false;}
}

function tplLabelHTML(which,data,mu,prefix){const tpl=S.etq[which];const PX=3.78;const w=Math.round(tpl.w*PX),h=Math.round(tpl.h*PX);const r=renderTplLabel(tpl,data,prefix);const ban=mu?`<div style="position:absolute;left:0;top:0;width:100%;background:#b3402f;color:#fff;font-size:9px;font-weight:700;text-align:center;padding:1px;letter-spacing:.1em;z-index:5">MUESTRA · SIN VALOR COMERCIAL</div>`:'';const html=`<div class="tlbl" style="position:relative;width:${w}px;height:${h}px;background:#fff;color:#000;overflow:hidden;page-break-inside:avoid;margin:4px">${ban}${r.html}</div>`;return {html,barJobs:r.barJobs,qrJobs:r.qrJobs};}

async function emitRemito(){const cliId=$('e_cli').value;const cli=S.clientes.find(c=>c.id===cliId);if(!cli)return banner('Elegí un cliente','warn');if(!remCart.items.length)return;

function planCompra(){
  const demand={};S.pedidos.filter(p=>p.estado==='pendiente').forEach(p=>p.items.forEach(it=>{demand[it.producto]=(demand[it.producto]||0)+(+it.paquetes||0);}));
  const rows=[];const mpNeed={};
  Object.keys(demand).forEach(prod=>{const ped=demand[prod];const st=stockProd(prod);const falta=Math.max(0,ped-st);const rTeo=rindeTeo(prod);const rReal=rindeReal(prod);const tipo=prodTipo(prod);
    rows.push({prod,ped,st,falta,rTeo,rReal,tipo});
    if(falta<=0)return;
    if(tipo==='comp_produccion'){(S.recetas[prod]||[]).forEach(r=>{mpNeed[r.mp]=(mpNeed[r.mp]||0)+falta*r.cantidad;});}
    else if(tipo==='simple'){const rinde=rindeBasis(rTeo,rReal);const mp=(S.prodMP[prod]||[])[0];if(mp&&rinde>0)mpNeed[mp]=(mpNeed[mp]||0)+falta/rinde;}
  });
  const compra=Object.keys(mpNeed).map(mp=>{const need=mpNeed[mp];const stk=stockMP(mp);return {mp,need:+need.toFixed(2),stk:+stk.toFixed(2),comprar:+Math.max(0,need-stk).toFixed(2)};});
  return {rows,compra};
}

function svgBars(data,color){
  if(!data.length)return '<div style="color:#6b7689;font-size:12px;padding:10px">Sin movimientos</div>';
  data=data.slice(0,8);const max=Math.max(...data.map(d=>d.value))||1;const bw=44,gap=16,h=130,pad=16;const w=data.length*(bw+gap)+pad;
  let bars='';data.forEach((d,i)=>{const bh=Math.max(2,Math.round((d.value/max)*(h-42)));const x=pad/2+i*(bw+gap);const y=h-bh-20;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${color}"></rect><text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="11" fill="#1c2536" font-family="Inter">${nf(d.value,d.value<10?1:0)}</text><text x="${x+bw/2}" y="${h-4}" text-anchor="middle" font-size="9" fill="#6b7689" font-family="Inter">${(d.label||'').slice(0,9)}</text>`;});
  return `<svg viewBox="0 0 ${w} ${h}" style="max-width:100%;height:auto">${bars}</svg>`;
}
function groupSum(arr,keyFn,valFn){const m={};arr.forEach(x=>{const k=keyFn(x);m[k]=(m[k]||0)+valFn(x);});return Object.keys(m).map(k=>({label:k,value:m[k]})).sort((a,b)=>b.value-a.value);}

function ventasData(){const out=[];S.entregas.filter(e=>e.estado!=='anulada'&&inRange(e.fecha)&&(!repF.cli||e.clienteNombre===repF.cli)).forEach(e=>{e.items.forEach(it=>{if(repF.prod&&it.producto!==repF.prod)return;const pv=+it.precio||0,cu=costoUnitTotal(it.producto),u=+it.cantidad||0;out.push({cliente:e.clienteNombre,producto:it.producto,fecha:e.fecha,nro:e.numero_remito,u,pv,venta:pv*u,cu,costo:cu*u,util:(pv-cu)*u});});});return out.sort((a,b)=>b.venta-a.venta);}
function trazaData(){const out=[];recFilt().forEach(r=>{const ps=S.producciones.filter(p=>p.estado!=='anulada'&&p.loteId===r.codigo_lote);let proc=0,obt=0;ps.forEach(p=>{proc+=+p.mpKg||0;obt+=p.outputs.reduce((a,o)=>a+(+o.kilos||0),0);});const codes=new Set();ps.forEach(p=>p.outputs.forEach(o=>codes.add(o.code)));const desps=S.despachos.filter(d=>d.estado!=='anulada'&&d.items.some(it=>(it.consumido||[]).some(c=>codes.has(c.code))));const dispIds=new Set(desps.map(d=>d.id));const ents=S.entregas.filter(e=>e.estado!=='anulada'&&e.items.some(it=>dispIds.has(it.did)));const e=ents[0]||{};out.push({lote:r.codigo_lote,frec:r.fecha,prov:r.proveedor,mp:r.materia_prima,kg:+r.kilos||0,proc,out:obt,cliente:e.clienteNombre||'',nro:e.numero_remito||'',fent:e.fecha||''});});return out;}

  if(t==='cumpl'){const m={};pedFilt().forEach(p=>p.items.forEach(it=>{if(repF.prod&&it.producto!==repF.prod)return;const k=p.clienteNombre+'||'+it.producto;m[k]=m[k]||{cliente:p.clienteNombre,producto:it.producto,ped:0,ent:0};m[k].ped+=it.paquetes;}));S.entregas.filter(e=>e.estado!=='anulada'&&inRange(e.fecha)&&(!repF.cli||e.clienteNombre===repF.cli)).forEach(e=>e.items.forEach(it=>{if(repF.prod&&it.producto!==repF.prod)return;const k=e.clienteNombre+'||'+it.producto;m[k]=m[k]||{cliente:e.clienteNombre,producto:it.producto,ped:0,ent:0};m[k].ent+=it.cantidad;}));const ents=Object.values(m).sort((a,b)=>b.ped-a.ped);const tp=ents.reduce((a,r)=>a+r.ped,0),te=ents.reduce((a,r)=>a+r.ent,0);

  if(t==='capac'){const days={};prodFilt().filter(p=>(+p.horas||0)>0&&(+p.operarios||0)>0).forEach(p=>{const paq=p.outputs.reduce((a,o)=>a+(+o.cantidad||0),0);days[p.fecha]=days[p.fecha]||{paq:0,hh:0,op:0,hs:0};days[p.fecha].paq+=paq;days[p.fecha].hh+=(+p.operarios||0)*(+p.horas||0);days[p.fecha].op=Math.max(days[p.fecha].op,+p.operarios||0);days[p.fecha].hs+=+p.horas||0;});const ks=Object.keys(days).sort();const totP=ks.reduce((a,k)=>a+days[k].paq,0),totHH=ks.reduce((a,k)=>a+days[k].hh,0);const avg=totHH>0?totP/totHH:0;
    ex.rows=[['Fecha','Paquetes','Operarios','Horas','Horas-hombre','Paq/hora-hombre']].concat(ks.map(k=>[fmtD(k),days[k].paq,days[k].op,+days[k].hs.toFixed(1),+days[k].hh.toFixed(1),days[k].hh>0?+(days[k].paq/days[k].hh).toFixed(1):'']));
    b.innerHTML=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)"><div class="kpi navy"><div class="lab">📦 Paquetes</div><div class="val">${nf(totP)}</div></div><div class="kpi steel"><div class="lab">⏱️ Horas-hombre</div><div class="val">${nf(totHH,1)}</div></div><div class="kpi gold"><div class="lab">⚡ Productividad</div><div class="val">${nf(avg,1)}</div><div class="un">paq / hora-hombre</div></div></div>

    <div class="card"><div class="card-h"><h3>Calculadora de capacidad</h3></div><p class="hint">¿Cuántas horas y operarios necesito para preparar un pedido? Completá los datos y tocá <b>Calcular</b>.${avg>0?` La productividad promedio actual es ${nf(avg,1)} paq/hora-hombre.`:' Todavía no hay producciones con operarios y horas cargadas; podés ingresar la productividad a mano.'}</p>
    <div class="g2"><div><label>Paquetes a preparar</label><input type="number" id="cap_paq" placeholder="ej: 5000" oninput="capCalc()"></div><div><label>Operarios disponibles</label><input type="number" id="cap_op" placeholder="ej: 7" oninput="capCalc()"></div></div>
    <div class="g2"><div><label>Productividad (paquetes por hora-hombre)</label><input type="number" id="cap_prod" step="0.1" value="${avg>0?avg.toFixed(1):''}" placeholder="ej: 120" oninput="capCalc()"></div><div style="display:flex;align-items:flex-end"><button class="btn btn-gold" style="width:100%" onclick="capCalc()">Calcular</button></div></div>
    <div id="cap_res" class="scan-note" style="margin-top:10px"></div></div>`;}
  window._repEx=ex;
}

async function downloadReportePDF(){
  const el=$('repSheet');if(!el)return;
  const btn=$('rep_pdf');btn.innerHTML='<span class="spin"></span>Generando...';btn.disabled=true;
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const img=canvas.toDataURL('image/png');const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const w=210,h=canvas.height*w/canvas.width;let pos=0,rem=h;
    pdf.addImage(img,'PNG',0,pos,w,h);rem-=297;
    while(rem>0){pdf.addPage();pos-=297;pdf.addImage(img,'PNG',0,pos,w,h);rem-=297;}

}

     <div style="font-weight:700;font-size:3.4mm;text-transform:uppercase;overflow:hidden">${esc(r.materia_prima||'')}</div>

function renderLoteLbl(){const r=recById(window._loteLbl);if(!r)return;

  let html='';for(let i=0;i<n;i++)html+=loteLblHTML(r,w,hh,i,i===n-1);
  $('lblArea').innerHTML=html;const qs=loteLblQS(hh);
  for(let i=0;i<n;i++){const el=$('qrl'+i);if(!el)continue;el.innerHTML='';
    try{new QRCode(el,{text:r.codigo_lote,width:256,height:256,colorDark:'#000',colorLight:'#fff'});}catch(e){el.textContent=r.codigo_lote;}
    el.querySelectorAll('canvas,img').forEach(x=>{x.style.width=qs+'mm';x.style.height=qs+'mm';});}
}

function traceGo(){const i=$('t_scan');let v=(i.value||'').trim();try{const o=JSON.parse(v);v=o.op||o.lote||v;}catch(e){}trace(fixCode(v));}
function notFoundTraz(code){$('t_panel').innerHTML=`<div class="card"><div class="empty" style="padding:30px"><div style="font-size:36px">🔍</div><h3>Código no encontrado</h3><p>No hay registros para <b>${code||'—'}</b>. Probá con un lote (L-), producción (P-), despacho (D-) o número de remito.</p></div></div>`;}
function showTraceEntrega(e){const cli=S.clientes.find(c=>c.id===e.cliente_id)||{};const lotes=[...new Set(e.items.map(it=>it.loteRef).filter(Boolean))];
  $('t_panel').innerHTML=`<div class="card"><div class="card-h"><h3>Remito ${e.numero_remito}</h3><span class="tag ok">${fmtD(e.fecha)}</span></div>
   <div style="font-size:13px;line-height:1.7;margin-bottom:10px">Cliente: <b>${e.clienteNombre||''}</b> · CUIT ${cli.cuit||'—'}<br>Lotes entregados: ${lotes.map(l=>`<b>${l}</b>`).join(', ')||'—'}</div>
   <div id="lblArea">${remitoHTML({nro:e.numero_remito,fecha:e.fecha,cliData:cli,items:e.items})}</div>
   <p class="hint" style="margin-top:8px">Para ver la cadena completa hacia atrás, consultá uno de los lotes entregados.</p></div>`;}
function trace(code){
  const panel=$('t_panel');if(!code)return notFoundTraz(code);
  const ent=S.entregas.find(x=>x.numero_remito===code||('R-'+x.numero_remito)===code);
  if(ent)return showTraceEntrega(ent);
  let lotes=[],prodsInChain=[];
  if(code.startsWith('L-')){const r=recById(code);if(r){lotes=[r];prodsInChain=S.producciones.filter(p=>p.estado!=='anulada'&&(p.loteId===code||(p.lotes||[]).some(l=>l.loteId===code)));}}
  else if(code.startsWith('P-')||code.startsWith('E-')){const p=S.producciones.find(x=>x.id===code);if(p){if(p.id.indexOf('E-')===0){const cons=S.ensConsumos.filter(c=>c.ensamblado_op===p.id);const cl=[...new Set(cons.map(c=>c.codigo_lote))];lotes=cl.map(x=>recById(x)).filter(Boolean);const herb=S.producciones.filter(hp=>hp.estado!=='anulada'&&hp.id!==p.id&&(cl.includes(hp.loteId)||(hp.lotes||[]).some(l=>cl.includes(l.loteId))));prodsInChain=[...herb,p];}else{prodsInChain=[p];lotes=loteObjsDeProd(p);}}}
  else if(code.startsWith('PR-')){const p=prodByCode(code);if(p){prodsInChain=[p];lotes=loteObjsDeProd(p);}}
  else if(code.startsWith('D-')){const d=S.despachos.find(x=>x.id===code);if(d){const codes=new Set();d.items.forEach(it=>(it.consumido||[]).forEach(c=>codes.add(c.code)));prodsInChain=S.producciones.filter(p=>p.estado!=='anulada'&&p.outputs.some(o=>codes.has(o.code)));prodsInChain.forEach(p=>loteObjsDeProd(p).forEach(r=>{if(!lotes.includes(r))lotes.push(r);}));}}
  if(!lotes.length&&!prodsInChain.length)return notFoundTraz(code);
  const codes=new Set();prodsInChain.forEach(p=>p.outputs.forEach(o=>codes.add(o.code)));
  const desps=S.despachos.filter(d=>d.estado!=='anulada'&&d.items.some(it=>(it.consumido||[]).some(c=>codes.has(c.code))));
  const dispIds=new Set(desps.map(d=>d.id));
  const ents=S.entregas.filter(e=>e.estado!=='anulada'&&e.items.some(it=>dispIds.has(it.did)));
  let nodes='';
  lotes.forEach(r=>{nodes+=`<div class="node"><div class="when">${fmtD(r.fecha)} · RECEPCIÓN</div><div class="what">${r.materia_prima} — Lote ${r.codigo_lote}</div><div class="det">Proveedor <b>${r.proveedor||'—'}</b> · ${nf(r.kilos,1)}kg${r.recibido_por?` · recibió ${r.recibido_por}`:''}<br>Stock en cámara: <b>${nf(stockLote(r),1)}kg</b></div></div>`;});
  const descMP=(S.descartes||[]).filter(d=>lotes.some(r=>r.codigo_lote===d.codigo_lote));
  descMP.forEach(d=>{nodes+=`<div class="node disc"><div class="when">${fmtD(d.fecha)} · DESCARTE DE MP ${d.codigo}</div><div class="what">${nf(d.kg,1)}kg de ${d.materia_prima} descartados</div><div class="det">${d.motivo?'Motivo: '+d.motivo:''}${d.registrado_por?' · '+d.registrado_por:''}</div></div>`;});
  prodsInChain.forEach(p=>{const ko=p.outputs.reduce((a,o)=>a+(+o.kilos||0),0);const rend=p.mpKg>0?ko/p.mpKg*100:0;const isEns=p.id.indexOf('E-')===0;const comps=isEns?S.ensConsumos.filter(c=>c.ensamblado_op===p.id):[];const orig=isEns?comps.map(c=>`${c.componente} (${c.codigo_lote})`).join(' + '):((p.lotes&&p.lotes.length)?p.lotes.map(l=>`${l.mp} ${l.loteId}`).join(' + '):p.loteId);nodes+=`<div class="node prod"><div class="when">${fmtD(p.fecha)} · ${isEns?'ENSAMBLADO':'PRODUCCIÓN'} ${p.id}</div><div class="what">${isEns?'Ensamblado de componentes':nf(p.mpKg,1)+'kg de MP · rinde '+nf(rend,0)+'%'}</div><div class="det">Origen: ${orig}<br>${p.outputs.map(o=>`${o.producto}: <b>${nf(o.cantidad)}u</b> · <span class="mono">${o.code}</span>`).join('<br>')}</div></div>`;});
  desps.forEach(d=>{const it=d.items[0]||{};const li=it.consumido?loteDeItem(it):{lote:'—'};nodes+=`<div class="node desp"><div class="when">${fmtD(d.fecha)} · ETIQUETADO ${d.id}</div><div class="what">${d.items.map(i=>i.producto).join(', ')}</div><div class="det">${d.items.map(i=>`${nf(i.cantidad)}u en ${i.cajas} cajas · lote ${li.lote} · VTO ${i.vto?fmtD(i.vto):'—'}`).join('<br>')}</div></div>`;});
  ents.forEach(e=>{const its=e.items.filter(it=>dispIds.has(it.did));const cli=S.clientes.find(c=>c.id===e.cliente_id)||{};nodes+=`<div class="node ent"><div class="when">${fmtD(e.fecha)} · ENTREGA · Remito ${e.numero_remito}</div><div class="what">Cliente: ${e.clienteNombre||''}</div><div class="det">${its.map(it=>`${it.producto}: <b>${nf(it.cantidad)}u</b>`).join('<br>')}<br>CUIT ${cli.cuit||'—'} · ${cli.localidad||''}</div></div>`;});
  const devs=(S.devoluciones||[]).filter(d=>(d.output_code&&codes.has(d.output_code))||lotes.some(r=>r.codigo_lote===d.lote_ref)||(d.despacho_codigo&&dispIds.has(d.despacho_codigo)));
  devs.forEach(d=>{nodes+=`<div class="node disc"><div class="when">${fmtD(d.fecha)} · DEVOLUCIÓN ${d.codigo}</div><div class="what">${devTipoLabel(d.tipo)} — ${nf(d.cantidad)}u de ${d.producto_nombre}</div><div class="det">Cliente: ${d.cliente_nombre||'—'}${d.reingreso_lote?`<br>Reingresado como MP: <b>${d.reingreso_lote}</b> (${nf(d.kg,1)}kg)`:''}${d.motivo?`<br>Motivo: ${d.motivo}`:''}</div></div>`;});
  const ensOps=[...new Set(S.ensConsumos.filter(c=>codes.has(c.output_code)).map(c=>c.ensamblado_op))];
  ensOps.forEach(op=>{const ap=S.producciones.find(p=>p.id===op);if(!ap||prodsInChain.some(p=>p.id===op))return;const o=ap.outputs[0]||{};nodes+=`<div class="node prod"><div class="when">${fmtD(ap.fecha)} · ENSAMBLADO ${op}</div><div class="what">Se usó en: ${o.producto||''}</div><div class="det">${o.producto}: <b>${nf(o.cantidad)}u</b> · <span class="mono">${o.code}</span></div></div>`;});
  if(!prodsInChain.length)nodes+=`<div class="node prod"><div class="when">PENDIENTE</div><div class="what" style="color:var(--muted)">Aún sin producción registrada</div></div>`;
  const titulo=lotes.length?`Lote ${lotes.map(r=>r.codigo_lote).join(' + ')}`:prodsInChain[0].id;
  panel.innerHTML=`<div class="card"><div class="card-h"><h3>Historia de ${titulo}</h3><span class="tag ok">${prodsInChain.length} producción(es) · ${desps.length} despacho(s) · ${ents.length} entrega(s)</span></div><div class="tl" style="margin-top:16px">${nodes}</div></div>`;
}

function canSee(rol,modId){if(rol==='admin')return true;const perm=(S.empresa&&S.empresa.permisos)?S.empresa.permisos[rol]:null;if(perm&&Array.isArray(perm))return perm.includes(modId);const m=MODS.find(x=>x.id===modId);return !!(m&&m.roles.includes(rol));}

function etqSample(){const p=S.productos.find(x=>x.activo!==false)||{};return {empresa:(S.empresa&&S.empresa.razon_social)||'EMPRESA',producto:p.nombre||'PRODUCTO DE EJEMPLO',contenido:(p.contenido_kg?nf(p.contenido_kg,3)+' kg':'250 g'),gtin:p.gtin||'7791234567890',qr:'L-00001',rnpa:p.rnpa||'00-0000000',rne:p.rne||'13-000000',env:fmtD(today()),vto:fmtD(today())};}
function etqVal(type,data,el){switch(type){case 'empresa':return data.empresa;case 'producto':return data.producto;case 'contenido':return data.contenido;case 'rnpa':return 'RNPA: '+data.rnpa;case 'rne':return 'RNE: '+data.rne;case 'fecha_elab':return 'Elab: '+data.env;case 'fecha_vto':return 'Vto: '+data.vto;case 'lote':return 'Lote: '+data.lote;case 'texto':return el.text||'Texto';default:return '';}}
function renderTplLabel(tpl,data,prefix){let html='',barJobs=[],qrJobs=[];(tpl.elements||[]).forEach(el=>{const base=`position:absolute;left:${el.x}px;top:${el.y}px;`;const tc=ETQ_TYPES.find(t=>t[0]===el.type);const kind=tc?tc[2]:'text';
  if(kind==='img'){const src=S.etq&&S.etq.logo;html+=`<div class="etqEl" data-id="${el.id}" style="${base}width:${el.w||60}px;height:${el.h||40}px;display:flex;align-items:center;justify-content:center;overflow:hidden">${src?`<img src="${src}" style="max-width:100%;max-height:100%;object-fit:contain">`:'<span style="font-size:9px;color:#bbb;border:1px dashed #ccc;padding:6px 10px">LOGO</span>'}</div>`;}
  else if(kind==='bar'){const id=prefix+'_'+el.id;barJobs.push({id,code:data.gtin,w:el.w||120,h:el.h||34});html+=`<div class="etqEl" data-id="${el.id}" id="${id}" style="${base}width:${el.w||120}px;height:${el.h||34}px"></div>`;}
  else if(kind==='qr'){const id=prefix+'_'+el.id;qrJobs.push({id,text:data.qr,size:el.w||80});html+=`<div class="etqEl" data-id="${el.id}" id="${id}" style="${base}width:${el.w||80}px;height:${el.w||80}px"></div>`;}
  else{const val=etqVal(el.type,data,el);html+=`<div class="etqEl" data-id="${el.id}" style="${base}font-size:${el.fs||11}px;font-weight:${el.bold?'700':'400'};text-align:${el.align||'left'};font-family:Inter,sans-serif;color:#111;line-height:1.15;white-space:nowrap">${esc(val)}</div>`;}
});return {html,barJobs,qrJobs};}
function etqBar(el,code,w,h){el.innerHTML='';try{const s=document.createElementNS('http://www.w3.org/2000/svg','svg');el.appendChild(s);JsBarcode(s,code||'0000000000000',{format:(code&&(''+code).length===13)?'EAN13':'CODE128',height:Math.max(14,h-12),fontSize:10,margin:0,displayValue:true});s.style.width=w+'px';s.style.height=h+'px';}catch(e){el.textContent=code;}}
function etqQr(el,text,size){el.innerHTML='';try{new QRCode(el,{text:text||'L-00001',width:size,height:size,colorDark:'#000',colorLight:'#fff'});}catch(e){el.textContent=text;}}
function cfgEtiquetas(){if(!S.etq)etqLoad();const tpl=S.etq[etqCur];

  <p class="hint">Diseñá tus etiquetas arrastrando cada dato a su lugar. Tocá un elemento para cambiar su letra/tamaño, agregá cuadros de texto, subí tu logo y elegí el tamaño de la etiqueta. <b>Guardá</b> al terminar. La impresión real con este diseño se conecta en el próximo paso.</p>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:12px;color:var(--muted)">🔍 Zoom</span><input type="range" min="1" max="4" step="0.25" value="${etqZoom}" oninput="etqSetZoom(+this.value)" style="width:150px"><span id="etqZoomV" style="font-size:12px;color:var(--muted);font-weight:600">${etqZoom}×</span></div>

function etqRenderCanvas(){const tpl=S.etq[etqCur];const PX=3.78;const cw=Math.round(tpl.w*PX),ch=Math.round(tpl.h*PX);const cv=$('etqCanvas');if(!cv)return;cv.style.width=cw+'px';cv.style.height=ch+'px';cv.style.transform='scale('+etqZoom+')';const sz=$('etqSizer');if(sz){sz.style.width=Math.round(cw*etqZoom)+'px';sz.style.height=Math.round(ch*etqZoom)+'px';}const {html,barJobs,qrJobs}=renderTplLabel(tpl,etqSample(),'etqc');cv.innerHTML=html;barJobs.forEach(j=>{const el=$(j.id);if(el)etqBar(el,j.code,j.w,j.h);});qrJobs.forEach(j=>{const el=$(j.id);if(el)etqQr(el,j.text,j.size);});
  cv.querySelectorAll('.etqEl').forEach(node=>{node.onpointerdown=e=>etqDragStart(e,node.dataset.id);});
  if(S.etqSel){const sel=cv.querySelector('[data-id="'+S.etqSel+'"]');if(sel)sel.style.outline='2px solid #c9a24b';}
}
function etqSetZoom(z){etqZoom=z;const v=$('etqZoomV');if(v)v.textContent=z+'×';etqRenderCanvas();}
function etqDragStart(e,id){e.preventDefault();etqSelect(id);const tpl=S.etq[etqCur];const el=tpl.elements.find(x=>x.id===id);if(!el)return;const cv=$('etqCanvas');const sx=e.clientX,sy=e.clientY,ox=el.x,oy=el.y;
  const move=ev=>{let nx=ox+(ev.clientX-sx)/etqZoom,ny=oy+(ev.clientY-sy)/etqZoom;nx=Math.max(0,Math.min(nx,cv.clientWidth-6));ny=Math.max(0,Math.min(ny,cv.clientHeight-6));el.x=Math.round(nx);el.y=Math.round(ny);const node=cv.querySelector('[data-id="'+id+'"]');if(node){node.style.left=el.x+'px';node.style.top=el.y+'px';}const pos=$('etqPos');if(pos)pos.textContent='Posición: '+el.x+', '+el.y+' px';};
  const up=()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);};
  document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
}
function etqSelect(id){S.etqSel=id;const cv=$('etqCanvas');if(cv)cv.querySelectorAll('.etqEl').forEach(n=>n.style.outline=n.dataset.id===id?'2px solid #c9a24b':'1px dashed rgba(0,0,0,.18)');etqRenderProps();}

function etqDelEl(){const tpl=S.etq[etqCur];tpl.elements=tpl.elements.filter(x=>x.id!==S.etqSel);S.etqSel=null;etqRenderCanvas();etqRenderProps();}
function etqProp(field,val,re){const tpl=S.etq[etqCur];const el=tpl.elements.find(x=>x.id===S.etqSel);if(!el)return;el[field]=val;etqRenderCanvas();if(re)etqRenderProps();}
function etqRenderProps(){const box=$('etqProps');if(!box)return;const tpl=S.etq[etqCur];const el=tpl.elements.find(x=>x.id===S.etqSel);if(!el){box.innerHTML='<div class="scan-note">Tocá un elemento del lienzo para editar su tamaño, letra y posición. Arrastralo para moverlo.</div>';return;}const tc=ETQ_TYPES.find(t=>t[0]===el.type);const kind=tc?tc[2]:'text';const label=tc?tc[1]:el.type;
  let h=`<div style="font-family:'Space Grotesk';font-weight:600;color:var(--navy);margin-bottom:8px">${label}</div>`;
  if(el.type==='texto')h+=`<label>Texto</label><input value="${esc(el.text||'')}" oninput="etqProp('text',this.value)">`;
  if(kind==='text'){h+=`<label>Tamaño de letra</label><input type="range" min="6" max="40" value="${el.fs||11}" oninput="etqProp('fs',+this.value)">
    <div style="margin:8px 0"><button class="btn btn-sm ${el.bold?'btn-gold':'btn-ghost'}" onclick="etqProp('bold',${el.bold?'false':'true'},1)">Negrita</button></div>
    <label>Alineación</label><div style="display:flex;gap:4px">${['left','center','right'].map(a=>`<button class="btn btn-sm ${el.align===a?'btn-gold':'btn-ghost'}" onclick="etqProp('align','${a}',1)">${a==='left'?'⬅':a==='center'?'≡':'➡'}</button>`).join('')}</div>`;}
  if(kind==='bar')h+=`<label>Ancho</label><input type="range" min="60" max="300" value="${el.w||130}" oninput="etqProp('w',+this.value)"><label>Alto</label><input type="range" min="20" max="90" value="${el.h||36}" oninput="etqProp('h',+this.value)">`;
  if(kind==='qr')h+=`<label>Tamaño</label><input type="range" min="40" max="200" value="${el.w||80}" oninput="etqProp('w',+this.value)">`;
  if(kind==='img')h+=`<label>Ancho</label><input type="range" min="20" max="300" value="${el.w||70}" oninput="etqProp('w',+this.value)"><label>Alto</label><input type="range" min="20" max="300" value="${el.h||44}" oninput="etqProp('h',+this.value)">`;
  h+=`<div id="etqPos" style="margin-top:8px;font-size:11px;color:var(--muted)">Posición: ${el.x}, ${el.y} px</div>`;
  h+=`<button class="btn btn-danger btn-sm" style="margin-top:10px" onclick="etqDelEl()">🗑 Eliminar</button>`;
  box.innerHTML=h;
}

function dlCSV(filename,rows){const csv=rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();banner('Descargado','');}
function viewStock(){
  const totMP=S.recepciones.filter(r=>r.estado!=='anulada').reduce((s,r)=>s+stockLote(r),0);
  let totProd=0;S.producciones.filter(p=>p.estado!=='anulada').forEach(p=>p.outputs.forEach(o=>totProd+=stockOut(o)));
  $('view').innerHTML=`

     <div class="kpi steel"><div class="lab">🏬 Stock de materia prima</div><div class="val">${nf(totMP,1)}</div><div class="un">kg en cámara</div></div>
     <div class="kpi gold"><div class="lab">🥗 Stock de productos</div><div class="val">${nf(totProd)}</div><div class="un">unidades listas para despacho</div></div>
   </div>
   <div class="card"><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">

function stkTab(t){window._stk=t;['mp','prod','lotes'].forEach(x=>{const b=$('stk_'+x);if(b)b.classList.toggle('btn-gold',x===t);});stkPaint();}
function mpAgg(){const R=S.recepciones.filter(r=>r.estado!=='anulada');const mp={};R.forEach(r=>{const k=r.materia_prima||'—';mp[k]=mp[k]||{comp:0,proc:0,desc:0};mp[k].comp+=+r.kilos||0;mp[k].proc+=kgConsumidoLote(r.codigo_lote);mp[k].desc+=descartadoLote(r.codigo_lote);});return mp;}
function prodAgg(){const ps={};S.producciones.filter(p=>p.estado!=='anulada').forEach(p=>p.outputs.forEach(o=>{ps[o.producto]=ps[o.producto]||{prod:0,desp:0,stock:0};ps[o.producto].prod+=+o.cantidad||0;ps[o.producto].desp+=despachadoDe(o.code);ps[o.producto].stock+=stockOut(o);}));return ps;}
function stkPaint(){const t=window._stk||'mp';const b=$('stkBody');if(!b)return;
  if(t==='mp'){const mp=mpAgg();const rows=Object.entries(mp).filter(([k,v])=>v.comp-v.proc-v.desc>0.001||v.desc>0.001).sort((a,b)=>(b[1].comp-b[1].proc-b[1].desc)-(a[1].comp-a[1].proc-a[1].desc));
    b.innerHTML=`<div class="card-h" style="margin-bottom:10px"><h3 style="font-size:15px">Materia prima en cámara</h3><button class="btn btn-ghost btn-sm" onclick="stkExport('mp')">⬇ CSV</button></div>
    <div style="overflow:auto"><table><thead><tr><th>Materia prima</th><th>Comprado kg</th><th>Procesado kg</th><th>Descartado kg</th><th>Stock kg</th></tr></thead><tbody>${rows.map(([k,v])=>`<tr><td>${k}</td><td class="mono">${nf(v.comp,1)}</td><td class="mono">${nf(v.proc,1)}</td><td class="mono">${v.desc>0?nf(v.desc,1):'—'}</td><td class="mono"><b>${nf(v.comp-v.proc-v.desc,1)}</b></td></tr>`).join('')||'<tr><td colspan=5 class=empty>Sin stock de materia prima</td></tr>'}</tbody></table></div>`;}
  else if(t==='prod'){const ps=prodAgg();const rows=Object.entries(ps).filter(([k,v])=>v.stock>0).sort((a,b)=>b[1].stock-a[1].stock);
    b.innerHTML=`<div class="card-h" style="margin-bottom:10px"><h3 style="font-size:15px">Productos procesados disponibles</h3><button class="btn btn-ghost btn-sm" onclick="stkExport('prod')">⬇ CSV</button></div>
    <div style="overflow:auto"><table><thead><tr><th>Producto</th><th>Producido</th><th>Despachado</th><th>Stock</th></tr></thead><tbody>${rows.map(([k,v])=>`<tr><td>${k}</td><td class="mono">${nf(v.prod)}</td><td class="mono">${nf(v.desp)}</td><td class="mono"><b>${nf(v.stock)}</b></td></tr>`).join('')||'<tr><td colspan=4 class=empty>Sin productos en stock</td></tr>'}</tbody></table></div>`;}
  else{const lotes=S.recepciones.filter(r=>r.estado!=='anulada'&&stockLote(r)>0.001).sort((a,b)=>a.fecha<b.fecha?-1:1);
    b.innerHTML=`<div class="card-h" style="margin-bottom:6px"><h3 style="font-size:15px">Detalle de lotes en cámara</h3></div><p class="hint">Cada lote con su stock remanente, del más antiguo al más nuevo (control PEPS).</p>
    <div style="overflow:auto"><table><thead><tr><th>Lote</th><th>Materia prima</th><th>Proveedor</th><th>Ingreso</th><th>Stock</th></tr></thead><tbody>${lotes.map(r=>`<tr><td class="mono">${r.codigo_lote}</td><td>${r.materia_prima}</td><td>${r.proveedor||'—'}</td><td>${fmtD(r.fecha)}</td><td class="mono"><b>${nf(stockLote(r),1)} kg</b></td></tr>`).join('')||'<tr><td colspan=5 class=empty>Sin lotes con stock</td></tr>'}</tbody></table></div>`;}
}
function stkExport(t){let rows;if(t==='mp'){const mp=mpAgg();rows=[['Materia prima','Comprado kg','Procesado kg','Descartado kg','Stock kg']].concat(Object.entries(mp).filter(([k,v])=>v.comp-v.proc-v.desc>0.001||v.desc>0.001).map(([k,v])=>[k,+v.comp.toFixed(1),+v.proc.toFixed(1),+v.desc.toFixed(1),+(v.comp-v.proc-v.desc).toFixed(1)]));}else{const ps=prodAgg();rows=[['Producto','Producido','Despachado','Stock']].concat(Object.entries(ps).filter(([k,v])=>v.stock>0).map(([k,v])=>[k,v.prod,v.desp,v.stock]));}dlCSV('stock_'+t+'_'+today()+'.csv',rows);}

// ---- STOCK DE INSUMOS ----
async function reloadInsumos(){
  const [{data:ins},{data:pi},{data:movs}]=await Promise.all([
    sb.from('insumos').select('*').eq('empresa_id',S.empresaId).order('nombre'),
    sb.from('producto_insumos').select('*').eq('empresa_id',S.empresaId),
    sb.from('insumo_movimientos').select('*').eq('empresa_id',S.empresaId).order('created_at',{ascending:false})
  ]);
  S.insumos=ins||[];
  const insById={};S.insumos.forEach(i=>insById[i.id]=i);const prodById={};S.productos.forEach(p=>prodById[p.id]=p.nombre);
  S.prodInsumos={};(pi||[]).forEach(x=>{const pn=prodById[x.producto_id];if(!pn)return;(S.prodInsumos[pn]=S.prodInsumos[pn]||[]).push({insumo_id:x.insumo_id,nombre:(insById[x.insumo_id]||{}).nombre||'?',unidad:(insById[x.insumo_id]||{}).unidad||'',costo:+(insById[x.insumo_id]||{}).costo||0,cantidad:+x.cantidad||0,momento:x.momento||'produccion',base:x.base||'unidad'});});
  S.insumoMovs=movs||[];
}
async function consumirInsumos(opCode,outputs){
  const delta={};outputs.forEach(o=>{(S.prodInsumos[o.producto]||[]).filter(r=>(r.momento||'produccion')==='produccion').forEach(r=>{delta[r.insumo_id]=(delta[r.insumo_id]||0)+(+o.cantidad||0)*(+r.cantidad||0);});});
  for(const id in delta){if(delta[id]<=0)continue;const ins=S.insumos.find(x=>x.id===id);const nuevo=(ins?+ins.stock:0)-delta[id];
    await sb.from('insumos').update({stock:nuevo}).eq('id',id).eq('empresa_id',S.empresaId);
    await sb.from('insumo_movimientos').insert({empresa_id:S.empresaId,insumo_id:id,tipo:'consumo',cantidad:delta[id],fecha:today(),referencia:opCode,nota:'producción'});
    if(ins)ins.stock=nuevo;}
}
async function consumirInsumosDespachoManual(dCode,list){for(const it of list){if(it.qty<=0)continue;const ins=S.insumos.find(x=>x.id===it.insumo_id);const nuevo=(ins?+ins.stock:0)-it.qty;await sb.from('insumos').update({stock:nuevo}).eq('id',it.insumo_id).eq('empresa_id',S.empresaId);await sb.from('insumo_movimientos').insert({empresa_id:S.empresaId,insumo_id:it.insumo_id,tipo:'consumo',cantidad:it.qty,fecha:today(),referencia:dCode,nota:'despacho'});if(ins)ins.stock=nuevo;}}
async function restaurarInsumos(opCode){
  const {data:movs}=await sb.from('insumo_movimientos').select('*').eq('empresa_id',S.empresaId).eq('referencia',opCode).eq('tipo','consumo');
  const agg={};(movs||[]).forEach(m=>agg[m.insumo_id]=(agg[m.insumo_id]||0)+(+m.cantidad||0));
  for(const id in agg){const ins=S.insumos.find(x=>x.id===id);const nuevo=(ins?+ins.stock:0)+agg[id];await sb.from('insumos').update({stock:nuevo}).eq('id',id).eq('empresa_id',S.empresaId);if(ins)ins.stock=nuevo;}
  if(movs&&movs.length)await sb.from('insumo_movimientos').delete().eq('empresa_id',S.empresaId).eq('referencia',opCode).eq('tipo','consumo');
}

async function reloadCostos(){const {data}=await sb.from('costos_producto').select('*').eq('empresa_id',S.empresaId);S.costos={};(data||[]).forEach(c=>{S.costos[c.producto_id]={gastos_op:+c.gastos_op||0,mano_obra:+c.mano_obra||0,flete:+c.flete||0,otros:+c.otros||0,precio_venta:+c.precio_venta||0};});}
function avgPriceKg(materia){let kg=0,tot=0;S.recepciones.filter(r=>r.estado!=='anulada'&&r.materia_prima===materia&&+r.precio_kilo>0).forEach(r=>{kg+=+r.kilos||0;tot+=(+r.kilos||0)*(+r.precio_kilo||0);});return kg>0?tot/kg:0;}
function descartadoMateria(materia){return (S.descartes||[]).filter(d=>d.materia_prima===materia).reduce((s,d)=>s+(+d.kg||0),0);}
function adjPriceKg(materia){let kg=0,tot=0;S.recepciones.filter(r=>r.estado!=='anulada'&&r.materia_prima===materia).forEach(r=>{kg+=+r.kilos||0;tot+=(+r.kilos||0)*(+r.precio_kilo||0);});const usable=kg-descartadoMateria(materia);if(usable>0.001)return tot/usable;return avgPriceKg(materia);}
function insumoCostoUnit(prodNombre){const p=S.productos.find(x=>x.nombre===prodNombre);const uxc=(p&&+p.unidades_por_caja)||1;let tot=0;const det=[];(S.prodInsumos[prodNombre]||[]).forEach(r=>{let cu;if(r.momento==='despacho'&&r.base==='caja')cu=r.cantidad*r.costo/uxc;else cu=r.cantidad*r.costo;tot+=cu;det.push({nombre:r.nombre,cu});});return {tot,det};}
function mpCostoUnit(prodNombre){let cost=0,units=0;
  S.producciones.filter(p=>p.estado!=='anulada'&&p.outputs.some(o=>o.producto===prodNombre)).forEach(p=>{
    const consumed=(p.lotes&&p.lotes.length)?p.lotes:[{loteId:p.loteId,kg:p.mpKg}];
    const mpCostProd=consumed.reduce((s,l)=>{const r=recById(l.loteId);const mat=r?r.materia_prima:'';return s+(+l.kg||0)*adjPriceKg(mat);},0);
    const totOutKg=p.outputs.reduce((s,o)=>s+(+o.kilos||0),0);
    const pOuts=p.outputs.filter(o=>o.producto===prodNombre);
    const pKg=pOuts.reduce((s,o)=>s+(+o.kilos||0),0);
    const pUnits=pOuts.reduce((s,o)=>s+(+o.cantidad||0),0);
    const share=totOutKg>0?pKg/totOutKg:(p.outputs.length?1/p.outputs.length:0);
    cost+=mpCostProd*share;units+=pUnits;});
  if(units>0)return {perUnit:cost/units,metodo:'real · precio prom. ajustado por descarte'};
  const receta=S.recetas[prodNombre]||[];
  if(receta.length){const c=receta.reduce((s,r)=>s+r.cantidad*adjPriceKg(r.mp),0);return {perUnit:c,metodo:'teórico · precio ajustado por descarte'};}
  const p=S.productos.find(x=>x.nombre===prodNombre);
  if(p&&+p.rinde>0){return {perUnit:0,metodo:'sin precio de MP cargado'};}
  return {perUnit:0,metodo:'sin datos'};
}

function costeoPanel(){const prod=$('co_prod').value;const p=S.productos.find(x=>x.nombre===prod)||{};const pid=p.id;

   </div>
