   <div class="g2"><div><label>Gastos operacionales</label><input type="number" id="co_go" step="0.01" value="${sv.gastos_op}" oninput="costeoCalc()"></div><div><label>Mano de obra</label><input type="number" id="co_mo" step="0.01" value="${sv.mano_obra}" oninput="costeoCalc()"></div></div>
   <div class="g2"><div><label>Flete</label><input type="number" id="co_fl" step="0.01" value="${sv.flete}" oninput="costeoCalc()"></div><div><label>Otros gastos</label><input type="number" id="co_ot" step="0.01" value="${sv.otros}" oninput="costeoCalc()"></div></div>
   <label>Precio de venta de referencia (por unidad)</label><input type="number" id="co_pv" step="0.01" value="${sv.precio_venta}" oninput="costeoCalc()">
   <div id="co_result" style="margin-top:16px"></div>
   <button class="btn btn-gold" id="co_save" style="margin-top:14px" onclick="saveCosteo('${pid}')">Guardar costeo</button>`;
  window._coAuto={mp:mp.perUnit,ins:ins.tot};costeoCalc();}
function costeoCalc(){const a=window._coAuto||{mp:0,ins:0};const go=+$('co_go').value||0,mo=+$('co_mo').value||0,fl=+$('co_fl').value||0,ot=+$('co_ot').value||0,pv=+$('co_pv').value||0;

  $('co_result').innerHTML=`<table><tbody>
   <tr><td>Costo materia prima</td><td class="mono" style="text-align:right">${money(a.mp)}</td></tr>

   <tr><td>Precio de venta</td><td class="mono" style="text-align:right">${money(pv)}</td></tr>
   <tr><td><b>Margen</b></td><td class="mono" style="text-align:right;color:${margen>=0?'var(--sage)':'var(--clay)'}"><b>${money(margen)} (${nf(margenPct,1)}%)</b></td></tr>
   </tbody></table>`;}

// ---- VALIDACIÓN DE CARGA (chofer) ----
let cargaState=null;
function viewCarga(){
  const pend=S.entregas.filter(e=>e.estado!=='anulada'&&!(e.validado&&e.validado.carga));
  const done=S.entregas.filter(e=>e.validado&&e.validado.carga);
  $('view').innerHTML=`<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Validación de carga</h3></div>
   <p class="hint">Antes de que salga el camión: elegí el remito y confirmá las cajas (escaneando el QR de cada caja o con +/−). Si hay diferencias, se pide el PIN del supervisor para autorizar.</p>
   <label>Remito a cargar</label><select id="cg_sel" onchange="cargaStart()"><option value="">— elegir remito —</option>${pend.map(e=>`<option value="${e.id}">${e.numero_remito} · ${e.clienteNombre} · ${fmtD(e.fecha)}</option>`).join('')}</select>
   <div id="cg_panel"></div></div>
   ${done.length?`<div class="card"><div class="card-h"><h3>Cargas validadas</h3></div><div style="overflow:auto"><table><thead><tr><th>Remito</th><th>Cliente</th><th>Validada</th><th>Por</th><th>Estado</th></tr></thead><tbody>${done.slice(0,12).map(e=>`<tr><td class="mono">${e.numero_remito}</td><td>${(e.clienteNombre||'').slice(0,18)}</td><td>${e.validado.at?fmtD(e.validado.at):''}</td><td>${e.validado.by||''}</td><td>${e.validado.forzado?'<span class="tag out">Con diferencias</span>':'<span class="tag ok">OK</span>'}</td></tr>`).join('')}</tbody></table></div></div>`:''}`;
}
function cargaStart(){const id=$('cg_sel').value;if(!id){cargaState=null;$('cg_panel').innerHTML='';return;}const e=S.entregas.find(x=>x.id===id);cargaState={entregaId:id,loaded:e.items.map(()=>0),extras:[]};cargaRender();}
function cargaRender(){const e=S.entregas.find(x=>x.id===cargaState.entregaId);if(!e)return;
  const rows=e.items.map((it,i)=>{const exp=+it.cajas||0;const ld=cargaState.loaded[i];const ok=ld===exp;return `<tr><td>${it.producto}</td><td class="mono">${it.loteRef||'—'}</td><td class="mono">${exp}</td><td class="mono"><b style="color:${ok?'var(--sage)':ld>exp?'var(--clay)':'var(--ink)'}">${ld}</b></td><td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="cargaAdj(${i},-1)">−</button> <button class="btn btn-ghost btn-sm" onclick="cargaAdj(${i},1)">+</button></td><td>${ok?'✅':ld>exp?'⚠️ sobra':'⏳'}</td></tr>`;}).join('');
  const totExp=e.items.reduce((s,it)=>s+(+it.cajas||0),0);const totLd=cargaState.loaded.reduce((a,b)=>a+b,0);
  $('cg_panel').innerHTML=`<div style="margin:12px 0"><label>Escanear QR de caja</label><input id="cg_scan" placeholder="el lector escribe acá y suma 1 caja" autocomplete="off"></div>
   <div style="overflow:auto"><table><thead><tr><th>Producto</th><th>Lote</th><th>Esperadas</th><th>Cargadas</th><th>Ajuste</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
   ${cargaState.extras.length?`<div class="note" style="margin-top:10px">⚠️ <b>${cargaState.extras.length} caja(s) escaneada(s) que no pertenecen a este remito:</b> ${cargaState.extras.join(', ')}</div>`:''}
   <div class="scan-note" style="margin-top:8px">Total cargado: <b>${totLd}</b> / ${totExp} cajas</div>
   <button class="btn btn-gold" style="margin-top:12px" onclick="cargaValidar()">✓ Validar e imprimir remito</button>`;
  const sc=$('cg_scan');if(sc){sc.focus();sc.addEventListener('keydown',ev=>{if(ev.key==='Enter'){cargaScan(sc.value);sc.value='';}});}
}
function cargaScan(txt){if(!txt)return;let lote='';try{const o=JSON.parse(txt);lote=(o.lote||'').toString();}catch(e){lote=txt.trim();}
  lote=fixCode(lote);const nl=normCode(lote);
  const ent=S.entregas.find(x=>x.id===cargaState.entregaId);let idx=-1;
  ent.items.forEach((it,i)=>{if(idx<0&&normCode(it.loteRef)===nl&&cargaState.loaded[i]<(+it.cajas||0))idx=i;});
  if(idx<0)ent.items.forEach((it,i)=>{if(idx<0&&normCode(it.loteRef)===nl)idx=i;});
  if(idx>=0){cargaState.loaded[idx]++;banner('Caja sumada: '+ent.items[idx].producto,'');}
  else{cargaState.extras.push(lote||'?');banner('Caja no pertenece a este remito','warn');}
  cargaRender();
}
function cargaAdj(i,d){cargaState.loaded[i]=Math.max(0,cargaState.loaded[i]+d);cargaRender();}
function cargaDifs(){const e=S.entregas.find(x=>x.id===cargaState.entregaId);const dif=[];e.items.forEach((it,i)=>{const exp=+it.cajas||0,ld=cargaState.loaded[i];if(ld!==exp)dif.push({producto:it.producto,esperado:exp,cargado:ld});});return dif;}
function cargaValidar(){const dif=cargaDifs();const hayDif=dif.length>0||cargaState.extras.length>0;
  if(!hayDif)return cargaGuardar(false,'');
  modal(`<h3>Hay diferencias en la carga</h3><p class="hint">${dif.map(d=>`${d.producto}: esperadas ${d.esperado}, cargadas ${d.cargado}`).join('<br>')}${cargaState.extras.length?`<br>${cargaState.extras.length} caja(s) ajenas`:''}</p><label>PIN del supervisor para autorizar</label><input type="password" id="cg_pin" autocomplete="off"><label>Nota (motivo de la diferencia)</label><input id="cg_nota" placeholder="ej: faltó 1 caja, se despacha igual"><div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="cargaPinOk()">Autorizar y validar</button></div>`);
}
function cargaPinOk(){if($('cg_pin').value!==(S.empresa.pin||'1234'))return banner('PIN incorrecto','err');const nota=$('cg_nota').value.trim();closeModal();cargaGuardar(true,nota);}
async function cargaGuardar(forzado,nota){const e=S.entregas.find(x=>x.id===cargaState.entregaId);const dif=cargaDifs();
  const validado={carga:true,at:new Date().toISOString(),by:S.nombre||'',forzado,dif,extras:cargaState.extras,nota};
  const {error}=await sb.from('entregas').update({validado}).eq('id',e.id).eq('empresa_id',S.empresaId);
  if(error)return banner('Error: '+error.message,'err');
  const remData={nro:e.numero_remito,fecha:e.fecha,cliData:S.clientes.find(c=>c.id===e.cliente_id)||{},items:e.items};
  await reloadEntregas();cargaState=null;banner(forzado?'Carga validada con diferencias · imprimí el remito':'Carga validada ✓ · imprimí el remito','');render();
  renderRemito(remData);
}

// ---- ENSAMBLADO (productos terminados → pack compuesto) ----
async function reloadEnsamblados(){const {data}=await sb.from('ensamblado_consumos').select('*').eq('empresa_id',S.empresaId);S.ensConsumos=(data||[]).map(c=>({ensamblado_op:c.ensamblado_op,componente:c.componente,output_code:c.output_code,codigo_lote:c.codigo_lote,cantidad:+c.cantidad||0}));}
function loteOrigenOutput(prod){return prod.loteId||((prod.lotes&&prod.lotes[0])?prod.lotes[0].loteId:'')||prod.id;}
function alocarProductoPEPS(prodNombre,unidades){const outs=[];S.producciones.filter(p=>p.estado!=='anulada'&&p.id.indexOf('E-')!==0).sort((a,b)=>a.fecha<b.fecha?-1:1).forEach(p=>{p.outputs.filter(o=>o.producto===prodNombre).forEach(o=>{outs.push({o,prod:p});});});
  const asign=[];let rem=unidades;for(const x of outs){const av=stockOut(x.o);if(av<=0)continue;const take=Math.min(av,rem);if(take<=0)break;asign.push({output_code:x.o.code,codigo_lote:loteOrigenOutput(x.prod),fecha:x.prod.fecha,cantidad:take});rem-=take;if(rem<=0)break;}return {asign,falta:Math.max(0,rem)};}
function viewEns(){const ensProds=S.productos.filter(p=>p.tipo==='comp_ensamblado');
  if(!ensProds.length){$('view').innerHTML=`<div class="card"><div class="empty" style="padding:30px"><div style="font-size:36px">🌿</div><h3>Sin productos de ensamblado</h3><p>Marcá un producto como compuesto de ensamblado y cargá su receta de componentes.</p></div></div>`;return;}
  $('view').innerHTML=`<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Nuevo ensamblado</h3></div>
   <p class="hint">Arma un pack a partir de productos ya terminados. La receta viene por defecto pero podés <b>editarla o sustituir</b> componentes si falta stock. Cada componente se toma del lote más antiguo (PEPS) y queda trazado.</p>
   <div class="g2"><div><label>Producto a ensamblar</label><select id="en_prod" onchange="ensLoadReceta()">${ensProds.map(p=>`<option value="${esc(p.nombre)}">${p.nombre}</option>`).join('')}</select></div><div><label>Cantidad de packs</label><input type="number" id="en_paq" min="1" oninput="ensCalc()"></div></div>
   <label style="margin-top:8px">Componentes del pack (editable)</label>
   <div id="en_receta"></div>
   <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="ensRecAdd()">+ Agregar componente</button>
   <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="guardarReceta()">💾 Guardar como receta por defecto</button>
   <div class="g2" style="margin-top:10px"><div><label>Fecha</label><input type="date" id="en_fecha" value="${today()}"></div><div></div></div>
   <div id="en_calc" style="margin:10px 0"></div>
   <button class="btn btn-gold" id="en_gen" style="width:100%;margin-top:8px" onclick="generarEnsamblado()">🌿 Generar ensamblado</button></div>
   <div class="card"><div class="card-h"><h3>Ensamblados recientes</h3></div><div style="overflow:auto"><table><thead><tr><th>Código</th><th>Fecha</th><th>Producto</th><th>Packs</th><th>Componentes</th></tr></thead><tbody>${ensRows()}</tbody></table></div></div>`;
  ensLoadReceta();
}
function ensLoadReceta(){const prod=$('en_prod').value;window._ensReceta=(S.componentes[prod]||[]).map(r=>({componente:r.componente,cantidad:r.cantidad}));ensRenderReceta();ensCalc();}
function ensRenderReceta(){const rec=window._ensReceta||[];const opts=[...S.productos].sort((a,b)=>a.nombre<b.nombre?-1:1).map(p=>p.nombre);
  $('en_receta').innerHTML=rec.map((r,i)=>`<div class="g2" style="grid-template-columns:1.6fr .5fr auto;gap:6px;align-items:center;margin-bottom:6px">
     <select onchange="ensRecComp(${i},this.value)">${opts.map(n=>`<option value="${esc(n)}" ${n===r.componente?'selected':''}>${n}</option>`).join('')}</select>
     <input type="number" min="0" step="1" value="${r.cantidad}" oninput="ensRecQty(${i},this.value)">
     <button class="btn btn-danger btn-sm" onclick="ensRecDel(${i})">✕</button></div>`).join('')||'<div class="hint">Sin componentes. Agregá al menos uno.</div>';}
function ensRecComp(i,v){window._ensReceta[i].componente=v;ensCalc();}
function ensRecQty(i,v){window._ensReceta[i].cantidad=+v||0;ensCalc();}
function ensRecDel(i){window._ensReceta.splice(i,1);ensRenderReceta();ensCalc();}
function ensRecAdd(){const opts=[...S.productos].sort((a,b)=>a.nombre<b.nombre?-1:1);window._ensReceta.push({componente:opts[0]?opts[0].nombre:'',cantidad:1});ensRenderReceta();ensCalc();}
function ensRows(){const ops=S.producciones.filter(p=>p.id.indexOf('E-')===0&&p.estado!=='anulada').slice(0,12);return ops.map(p=>{const o=p.outputs[0]||{};const comps=S.ensConsumos.filter(c=>c.ensamblado_op===p.id);return `<tr><td class="mono">${p.id}</td><td>${fmtD(p.fecha)}</td><td>${(o.producto||'').slice(0,20)}</td><td class="mono">${nf(o.cantidad||0)}</td><td style="font-size:11px">${comps.map(c=>c.componente.split(' ')[0]+' '+c.codigo_lote).join(' · ')}</td></tr>`;}).join('')||'<tr><td colspan=5 class=empty>Sin ensamblados</td></tr>';}
function ensCalc(){const paq=+$('en_paq').value||0;const receta=window._ensReceta||[];
  if(!receta.length){$('en_calc').innerHTML='';return;}
  let html='<div style="font-size:13px;line-height:1.8">',ok=true;
  receta.forEach(r=>{if(!r.componente||r.cantidad<=0)return;const nec=paq*r.cantidad;const {asign,falta}=alocarProductoPEPS(r.componente,nec);if(falta>0)ok=false;
    html+=`<div><b>${r.componente}</b>: ${nf(nec)}u ${falta>0?`<span style="color:var(--clay)">⚠ faltan ${nf(falta)}u — sustituí o reponé</span>`:'→ '+asign.map(a=>`${nf(a.cantidad)}u de ${a.codigo_lote}`).join(' + ')}</div>`;});
  html+='</div>';$('en_calc').innerHTML=paq?html:'';window._ensOk=ok;
}
async function guardarReceta(){const prod=$('en_prod').value;const rec=(window._ensReceta||[]).filter(r=>r.componente&&r.cantidad>0);const pid=prodIdByName(prod);
  if(!pid)return banner('Producto inválido','warn');
  try{await sb.from('producto_componentes').delete().eq('empresa_id',S.empresaId).eq('producto_id',pid);
    if(rec.length){const rows=rec.map(r=>({empresa_id:S.empresaId,producto_id:pid,componente:r.componente,cantidad:r.cantidad}));const {error}=await sb.from('producto_componentes').insert(rows);if(error)throw error;}
    await reloadCatalogo();banner('Receta por defecto guardada','');
  }catch(err){banner('Error: '+err.message,'err');}
}
async function generarEnsamblado(){const prod=$('en_prod').value;const paq=+$('en_paq').value||0;const fecha=$('en_fecha').value;const info=prodInfo(prod);
  if(paq<=0)return banner('Indicá la cantidad de packs','warn');
  const receta=(window._ensReceta||[]).filter(r=>r.componente&&r.cantidad>0);if(!receta.length)return banner('Cargá al menos un componente','warn');
  const consumos=[];for(const r of receta){const nec=paq*r.cantidad;const {asign,falta}=alocarProductoPEPS(r.componente,nec);if(falta>0)return banner('No alcanza el stock de '+r.componente+' (faltan '+nf(falta)+'u). Sustituí ese componente.','warn');asign.forEach(a=>consumos.push({componente:r.componente,output_code:a.output_code,codigo_lote:a.codigo_lote,cantidad:a.cantidad}));}
  $('en_gen').innerHTML='<span class="spin"></span>Generando...';$('en_gen').disabled=true;
  try{
    const {data:nE,error:e1}=await sb.rpc('siguiente_numero',{p_tipo:'ens'});if(e1)throw e1;const codigo='E-'+pad(nE);
    const {data:nP,error:e2}=await sb.rpc('siguiente_numero',{p_tipo:'prod'});if(e2)throw e2;const prCode='PR-'+pad(nP);
    const kilos=+(paq*(info.contenido||0)).toFixed(3);
    const {data:pRow,error:e3}=await sb.from('producciones').insert({empresa_id:S.empresaId,codigo_op:codigo,recepcion_id:null,fecha,mp_kg:kilos,operarios:0,estado:'validada',validado_at:new Date().toISOString()}).select('id').single();
    if(e3)throw e3;
    const {error:e4}=await sb.from('produccion_outputs').insert({empresa_id:S.empresaId,produccion_id:pRow.id,codigo_prod:prCode,producto_nombre:prod,cantidad:paq,kilos});
    if(e4)throw e4;
    const rows=consumos.map(c=>({empresa_id:S.empresaId,ensamblado_op:codigo,componente:c.componente,output_code:c.output_code,codigo_lote:c.codigo_lote,cantidad:c.cantidad}));
    const {error:e5}=await sb.from('ensamblado_consumos').insert(rows);if(e5)throw e5;
    await reloadProducciones();await reloadEnsamblados();
    await consumirInsumos(codigo,[{producto:prod,cantidad:paq}]);await reloadInsumos();
    banner('Ensamblado '+codigo+' generado · '+paq+' packs','');render();
  }catch(err){banner('Error: '+err.message,'err');$('en_gen').innerHTML='🌿 Generar ensamblado';$('en_gen').disabled=false;}
}

function editProducto(id){const p=id?S.productos.find(x=>x.id===id):{};const fams=['anonima','aizu','granel','otro'];const tipos=[['simple','Simple'],['comp_produccion','Compuesto (producción)'],['comp_ensamblado','Ensamblado']];
  modal(`<h3>${id?'Editar':'Nuevo'} producto</h3>
   <label>Nombre</label><input id="pf_nom" value="${esc(p.nombre||'')}">
   <div class="g2"><div><label>Presentación</label><input id="pf_pres" value="${esc(p.presentacion||'')}" placeholder="CAJA X 10 UNIDADES"></div><div><label>Familia</label><select id="pf_fam">${fams.map(f=>`<option ${p.familia===f?'selected':''}>${f}</option>`).join('')}</select></div></div>
   <div class="g2"><div><label>Contenido (kg por unidad)</label><input type="number" step="0.001" id="pf_kg" value="${p.contenido_kg!=null?p.contenido_kg:''}"></div><div><label>Unidades por caja</label><input type="number" id="pf_uxc" value="${p.unidades_por_caja||''}"></div></div>
   <div class="g2"><div><label>Vida útil (días)</label><input type="number" id="pf_vida" value="${p.vida_util_dias||''}"></div><div><label>Rinde (unid. por kg de MP)</label><input type="number" step="0.01" id="pf_rinde" value="${p.rinde!=null?p.rinde:''}"></div></div>
   <div class="g2"><div><label>RNPA</label><input id="pf_rnpa" value="${esc(p.rnpa||'')}"></div><div><label>RNE</label><input id="pf_rne" value="${esc(p.rne||'')}"></div></div>
   <div class="g2"><div><label>GTIN (EAN-13)</label><input id="pf_gtin" value="${esc(p.gtin||'')}"></div><div><label>Tipo</label><select id="pf_tipo">${tipos.map(t=>`<option value="${t[0]}" ${(p.tipo||'simple')===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select></div></div>
   <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:6px"><input type="checkbox" id="pf_micro" ${p.microondas?'checked':''} style="width:auto"> Apto microondas</label>
   <div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="saveProducto('${id||''}')">Guardar</button></div>`);}
async function saveProducto(id){const nom=$('pf_nom').value.trim();if(!nom)return banner('Indicá el nombre','warn');
  const rec={empresa_id:S.empresaId,nombre:nom,presentacion:$('pf_pres').value.trim()||null,familia:$('pf_fam').value,contenido_kg:+$('pf_kg').value||null,unidades_por_caja:+$('pf_uxc').value||null,vida_util_dias:+$('pf_vida').value||null,rinde:+$('pf_rinde').value||null,rnpa:$('pf_rnpa').value.trim()||null,rne:$('pf_rne').value.trim()||null,gtin:$('pf_gtin').value.trim()||null,tipo:$('pf_tipo').value,microondas:$('pf_micro').checked};
  try{let r;if(id)r=await sb.from('productos').update(rec).eq('id',id).eq('empresa_id',S.empresaId);else r=await sb.from('productos').insert(rec);if(r.error)throw r.error;
    await reloadCatalogo();closeModal();banner('Producto guardado','');cfgProd();
  }catch(err){banner('Error: '+err.message,'err');}}
async function toggleProducto(id){const p=S.productos.find(x=>x.id===id);if(p.activo!==false&&!confirm('¿Dar de baja "'+p.nombre+'"? No se borra; queda inactivo y deja de ofrecerse.'))return;await sb.from('productos').update({activo:p.activo===false}).eq('id',id).eq('empresa_id',S.empresaId);await reloadCatalogo();banner('Producto actualizado','');cfgProd();}
let cfgCliQ='';
function cfgCli(){const q=cfgCliQ.toLowerCase();const list=S.clientes.filter(c=>!q||c.razon_social.toLowerCase().includes(q)||(c.cuit||'').toLowerCase().includes(q)).slice(0,300);
  $('cfg_body').innerHTML=`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><input id="cc_q" placeholder="Buscar cliente..." value="${esc(cfgCliQ)}" oninput="cfgCliQ=this.value;cfgCli();setTimeout(()=>{const i=document.getElementById('cc_q');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},0)" style="flex:1;min-width:180px"><button class="btn btn-gold btn-sm" onclick="editCliente()">+ Nuevo cliente</button></div>
   <div style="overflow:auto"><table><thead><tr><th>Razón social</th><th>CUIT</th><th>IVA</th><th>Localidad</th><th></th></tr></thead><tbody>${list.map(c=>`<tr style="${c.activo===false?'opacity:.5':''}"><td>${c.razon_social}</td><td class="mono">${c.cuit||'—'}</td><td>${(c.iva||'').slice(0,18)}</td><td>${c.localidad||'—'}</td><td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="editCliente('${c.id}')">Editar</button> <button class="btn btn-ghost btn-sm" onclick="toggleCliente('${c.id}')">${c.activo===false?'Activar':'Baja'}</button></td></tr>`).join('')||'<tr><td colspan=5 class=empty>Sin clientes</td></tr>'}</tbody></table></div>
   <p class="hint" style="margin-top:8px">${S.clientes.length} clientes en total · mostrando ${list.length}.</p>`;}
function editCliente(id){const c=id?S.clientes.find(x=>x.id===id):{};const ivas=['Responsable Inscripto','Monotributista','Consumidor Final','Exento','No Alcanzado'];
  modal(`<h3>${id?'Editar':'Nuevo'} cliente</h3>
   <label>Razón social</label><input id="clf_rs" value="${esc(c.razon_social||'')}">
   <div class="g2"><div><label>CUIT / DNI</label><input id="clf_cuit" value="${esc(c.cuit||'')}"></div><div><label>Condición IVA</label><select id="clf_iva">${ivas.map(i=>`<option ${c.iva===i?'selected':''}>${i}</option>`).join('')}</select></div></div>
   <label>Domicilio</label><input id="clf_dom" value="${esc(c.domicilio||'')}">
   <div class="g2"><div><label>Localidad</label><input id="clf_loc" value="${esc(c.localidad||'')}"></div><div><label>Provincia</label><input id="clf_prov" value="${esc(c.provincia||'')}"></div></div>
   <label>Teléfono</label><input id="clf_tel" value="${esc(c.telefono||'')}">
   <div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="saveCliente('${id||''}')">Guardar</button></div>`);}
async function saveCliente(id){const rs=$('clf_rs').value.trim();if(!rs)return banner('Indicá la razón social','warn');
  const rec={empresa_id:S.empresaId,razon_social:rs,cuit:$('clf_cuit').value.trim()||null,iva:$('clf_iva').value,domicilio:$('clf_dom').value.trim()||null,localidad:$('clf_loc').value.trim()||null,provincia:$('clf_prov').value.trim()||null,telefono:$('clf_tel').value.trim()||null};
  try{let r;if(id)r=await sb.from('clientes').update(rec).eq('id',id).eq('empresa_id',S.empresaId);else r=await sb.from('clientes').insert(rec);if(r.error)throw r.error;
    await reloadCatalogo();closeModal();banner('Cliente guardado','');cfgCli();
  }catch(err){banner('Error: '+err.message,'err');}}
async function toggleCliente(id){const c=S.clientes.find(x=>x.id===id);if(c.activo!==false&&!confirm('¿Dar de baja a "'+c.razon_social+'"?'))return;await sb.from('clientes').update({activo:c.activo===false}).eq('id',id).eq('empresa_id',S.empresaId);await reloadCatalogo();banner('Cliente actualizado','');cfgCli();}
function cfgProv(){$('cfg_body').innerHTML=`<div class="g2"><div><label>Nuevo proveedor</label><input id="pv_nom" placeholder="Nombre del proveedor"></div><div style="display:flex;align-items:end"><button class="btn btn-gold btn-sm" onclick="addProveedor()">+ Agregar</button></div></div>
   <div style="overflow:auto;margin-top:12px"><table><thead><tr><th>Proveedor</th><th>Estado</th><th></th></tr></thead><tbody>${S.proveedores.map(p=>`<tr style="${p.activo===false?'opacity:.5':''}"><td>${p.nombre}</td><td><span class="tag ${p.activo===false?'out':'ok'}">${p.activo===false?'Inactivo':'Activo'}</span></td><td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="editProveedor('${p.id}')">Editar</button> <button class="btn btn-ghost btn-sm" onclick="toggleProveedor('${p.id}')">${p.activo===false?'Activar':'Baja'}</button></td></tr>`).join('')||'<tr><td colspan=3 class=empty>Sin proveedores</td></tr>'}</tbody></table></div>`;}
async function addProveedor(){const nom=$('pv_nom').value.trim();if(!nom)return banner('Indicá el nombre','warn');const {error}=await sb.from('proveedores').insert({empresa_id:S.empresaId,nombre:nom});if(error)return banner('Error: '+error.message,'err');await reloadCatalogo();banner('Proveedor agregado','');cfgProv();}
function editProveedor(id){const p=S.proveedores.find(x=>x.id===id);modal(`<h3>Editar proveedor</h3><label>Nombre</label><input id="pv_ed" value="${esc(p.nombre)}"><div class="row"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="saveProveedor('${id}')">Guardar</button></div>`);}
async function saveProveedor(id){const nom=$('pv_ed').value.trim();if(!nom)return banner('Indicá el nombre','warn');await sb.from('proveedores').update({nombre:nom}).eq('id',id).eq('empresa_id',S.empresaId);await reloadCatalogo();closeModal();banner('Proveedor guardado','');cfgProv();}
async function toggleProveedor(id){const p=S.proveedores.find(x=>x.id===id);await sb.from('proveedores').update({activo:p.activo===false}).eq('id',id).eq('empresa_id',S.empresaId);await reloadCatalogo();banner('Proveedor actualizado','');cfgProv();}

// ---- DESCARTE DE MATERIA PRIMA ----
async function reloadDescartes(){const {data}=await sb.from('descartes').select('*').eq('empresa_id',S.empresaId).order('created_at',{ascending:false});S.descartes=data||[];}
function viewDescarte(){const lotes=S.recepciones.filter(r=>r.estado!=='anulada'&&stockLote(r)>0.001).sort((a,b)=>a.fecha<b.fecha?-1:1);
  const perdidaTotal=(S.descartes||[]).reduce((s,d)=>s+(+d.kg||0)*avgPriceKg(d.materia_prima),0);
  $('view').innerHTML=`<div class="kpis" style="grid-template-columns:repeat(2,1fr)">
     <div class="kpi gold"><div class="lab">💸 Pérdida por descarte</div><div class="val">${money(perdidaTotal)}</div><div class="un">valor de la MP descartada</div></div>
     <div class="kpi steel"><div class="lab">🗑️ Descartes</div><div class="val">${(S.descartes||[]).length}</div><div class="un">registros</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Registrar descarte de materia prima</h3></div>
   <p class="hint">Cuando una MP en cámara se pierde (vencida, dañada, cadena de frío), registrala acá. Baja del stock, suma como pérdida y se absorbe en el costo promedio del kilo. Requiere PIN del supervisor.</p>
   <label>Lote a descartar</label>
   <select id="ds_lote" onchange="dsPick()"><option value="">— elegir lote —</option>${lotes.map(r=>`<option value="${r.codigo_lote}">${r.codigo_lote} · ${r.materia_prima} · ${nf(stockLote(r),1)}kg disp.</option>`).join('')}</select>
   <div class="g2"><div><label>Kilos a descartar</label><input type="number" id="ds_kg" min="0" step="0.01" oninput="dsLoss()"></div><div><label>Fecha</label><input type="date" id="ds_fecha" value="${today()}"></div></div>
   <div id="ds_lossv" class="scan-note" style="margin:4px 0"></div>
   <label>Motivo</label><input id="ds_motivo" placeholder="ej: producto vencido / rotura de cadena de frío">
   <label>PIN del supervisor</label><input type="password" id="ds_pin" autocomplete="off">
   <button class="btn btn-gold" id="ds_save" style="margin-top:14px" onclick="saveDescarte()">Registrar descarte</button></div>
   <div class="card"><div class="card-h"><h3>Descartes recientes</h3></div><div style="overflow:auto"><table><thead><tr><th>Código</th><th>Fecha</th><th>Lote</th><th>Materia prima</th><th>Kg</th><th>Pérdida</th><th>Motivo</th></tr></thead><tbody>${S.descartes.slice(0,15).map(d=>`<tr><td class="mono">${d.codigo}</td><td>${fmtD(d.fecha)}</td><td class="mono">${d.codigo_lote||'—'}</td><td>${(d.materia_prima||'').slice(0,16)}</td><td class="mono">${nf(d.kg,1)}</td><td class="mono">${money((+d.kg||0)*avgPriceKg(d.materia_prima))}</td><td>${(d.motivo||'').slice(0,20)}</td></tr>`).join('')||'<tr><td colspan=7 class=empty>Sin descartes registrados</td></tr>'}</tbody></table></div></div>`;
}
function dsPick(){const cl=$('ds_lote').value;const r=S.recepciones.find(x=>x.codigo_lote===cl);const k=$('ds_kg');if(r&&k&&!k.value)k.value=+stockLote(r).toFixed(2);dsLoss();}
function dsLoss(){const cl=$('ds_lote').value;const r=S.recepciones.find(x=>x.codigo_lote===cl);const kg=+$('ds_kg').value||0;const el=$('ds_lossv');if(!el)return;if(r&&kg>0){el.innerHTML=`Pérdida estimada: <b>${money(kg*avgPriceKg(r.materia_prima))}</b> (precio prom. ${money(avgPriceKg(r.materia_prima))}/kg)`;}else el.innerHTML='';}
async function saveDescarte(){const cl=$('ds_lote').value;const kg=+$('ds_kg').value||0;
  if(!cl)return banner('Elegí un lote','warn');if(kg<=0)return banner('Indicá los kilos','warn');
  if($('ds_pin').value!==(S.empresa.pin||'1234'))return banner('PIN incorrecto','err');
  const r=S.recepciones.find(x=>x.codigo_lote===cl);const disp=r?stockLote(r):0;
  if(kg>disp+0.001)return banner('Solo hay '+nf(disp,1)+'kg disponibles en ese lote','warn');
  $('ds_save').innerHTML='<span class="spin"></span>Registrando...';$('ds_save').disabled=true;
  try{const {data:num,error:e1}=await sb.rpc('siguiente_numero',{p_tipo:'descarte'});if(e1)throw e1;
    const codigo='DESC-'+pad(num);
    const {error}=await sb.from('descartes').insert({empresa_id:S.empresaId,codigo,fecha:$('ds_fecha').value,codigo_lote:cl,materia_prima:r?r.materia_prima:'',kg,motivo:$('ds_motivo').value.trim(),registrado_por:S.nombre||''});
    if(error)throw error;
    await reloadDescartes();banner('Descarte '+codigo+' registrado','');render();
  }catch(err){banner('Error: '+err.message,'err');$('ds_save').innerHTML='Registrar descarte';$('ds_save').disabled=false;}
}

// ---- ARRANQUE: sesión persistente ----
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){await boot();}
  else{showLogin();}
})();
</script>
</body>
</html>
